<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AURA · Inspect IDB</title>
<style>
  :root {
    --bg: #0a0e14;
    --bg2: #11151c;
    --bg3: #161b25;
    --fg: #d8e0ec;
    --muted: #6b7682;
    --green: #00e87a;
    --red: #ff3d6b;
    --yellow: #ffd23f;
    --blue: #38d4f5;
    --purple: #b39ddb;
    --border: #1f2630;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    margin: 0;
    padding: 16px;
    min-height: 100vh;
    line-height: 1.5;
    font-size: 14px;
  }
  h1 {
    color: var(--blue);
    font-size: 1.3rem;
    margin: 0 0 16px;
    text-align: center;
  }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .card h2 {
    color: var(--yellow);
    font-size: 1rem;
    margin: 0 0 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .store-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin: 8px 0;
  }
  .store-name {
    color: var(--blue);
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
  }
  .label { color: var(--muted); }
  .val { color: var(--fg); text-align: right; }
  .val.ok { color: var(--green); }
  .val.warn { color: var(--yellow); }
  .val.crit { color: var(--red); }
  .val.info { color: var(--blue); }
  button {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  button.primary {
    background: var(--blue);
    color: #0a0e14;
  }
  button.ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg);
  }
  pre {
    background: #000;
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 0.7rem;
    color: var(--green);
    margin-top: 8px;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
  }
  .keypath-tag {
    display: inline-block;
    background: rgba(255,210,63,0.15);
    color: var(--yellow);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.7rem;
    margin-left: 6px;
  }
  .empty-tag {
    display: inline-block;
    background: rgba(255,61,107,0.15);
    color: var(--red);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.7rem;
  }
  .full-tag {
    display: inline-block;
    background: rgba(0,232,122,0.15);
    color: var(--green);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.7rem;
  }
  details {
    margin-top: 6px;
    padding: 6px 0;
    border-top: 1px solid var(--border);
  }
  details summary {
    cursor: pointer;
    color: var(--purple);
    font-size: 0.85rem;
    padding: 4px 0;
  }
  details[open] summary {
    color: var(--blue);
  }
  .copy-info {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 8px;
    text-align: center;
  }
  .global-stats {
    background: rgba(56,212,245,0.08);
    border: 1px solid rgba(56,212,245,0.3);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .all-bases {
    font-size: 0.85rem;
    color: var(--purple);
    margin: 4px 0;
  }
</style>
</head>
<body>

<h1>🔬 AURA · Inspect IndexedDB</h1>

<div class="card global-stats">
  <h2>📊 Bases IndexedDB détectées</h2>
  <div id="all-bases">Recherche…</div>
</div>

<div id="content">
  <div class="card">Chargement…</div>
</div>

<button id="btn-refresh" class="ghost">🔄 Rafraîchir</button>
<button id="btn-copy" class="primary">📋 Copier le rapport pour Claude</button>
<button class="primary" onclick="window.close()" style="background:var(--green)">✓ Fermé</button>

<div class="copy-info">Lecture seule. Aucune modification de la base.</div>

<script>
'use strict';

const TARGET_DB_NAME = 'NEXUS_DB';
const TARGET_SAVE_KEY = 'nexus_state_v2';

let lastReport = '';

function el(tag, opts = {}, children = []) {
  const e = document.createElement(tag);
  if (opts.cls) e.className = opts.cls;
  if (opts.html) e.innerHTML = opts.html;
  if (opts.text) e.textContent = opts.text;
  if (opts.id) e.id = opts.id;
  for (const c of children) {
    if (c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function formatSize(bytes) {
  if (!bytes) return '0 o';
  if (bytes < 1024) return bytes + ' o';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' Ko';
  return (bytes/(1024*1024)).toFixed(2) + ' Mo';
}

function trunc(s, max) {
  if (s == null) return '(null)';
  if (typeof s !== 'string') s = String(s);
  if (s.length > max) return s.substring(0, max) + ' … (' + s.length + ' chars)';
  return s;
}

function jsonPreview(obj, max = 800) {
  try {
    const s = JSON.stringify(obj, null, 2);
    return trunc(s, max);
  } catch (e) {
    return '(non-JSON: ' + (e && e.message) + ')';
  }
}

async function listAllDatabases() {
  if (!indexedDB.databases) {
    return [{ name: '(API .databases() non supportée)', version: '?' }];
  }
  try {
    return await indexedDB.databases();
  } catch (e) {
    return [{ name: '(erreur: ' + e.message + ')', version: '?' }];
  }
}

function openDB(name) {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(name);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error('open error'));
    req.onblocked = () => reject(new Error('blocked'));
  });
}

async function inspectStore(db, storeName) {
  const info = {
    name: storeName,
    keyPath: null,
    autoIncrement: false,
    count: 0,
    keys: [],
    samples: [],
    error: null
  };

  try {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    info.keyPath = store.keyPath;
    info.autoIncrement = store.autoIncrement;

    // Compter
    info.count = await new Promise((resolve, reject) => {
      const req = store.count();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });

    // Récupérer les clés (max 20)
    info.keys = await new Promise((resolve, reject) => {
      const req = store.getAllKeys();
      req.onsuccess = () => {
        const all = req.result || [];
        resolve(all.slice(0, 20).map(k => typeof k === 'string' ? k : JSON.stringify(k)));
      };
      req.onerror = () => reject(req.error);
    });

    // Récupérer les 3 premiers enregistrements complets
    info.samples = await new Promise((resolve, reject) => {
      const req = store.getAll(undefined, 3);
      req.onsuccess = () => {
        const all = req.result || [];
        resolve(all.map(item => {
          // Pour chaque item, extraire les champs intéressants
          if (item && typeof item === 'object') {
            const sample = { __type: 'object' };
            // Champs les plus utiles
            ['key', 'cycle', 'tradingMode', 'botAutoMode', 'savedAt', 'portfolio', 'cashAccount', 'tradingAccount', 'version', 'vMajor', 'id', 'pair', 'time'].forEach(k => {
              if (k in item) sample[k] = item[k];
            });
            sample.__totalKeys = Object.keys(item).length;
            return sample;
          }
          return item;
        }));
      };
      req.onerror = () => reject(req.error);
    });

  } catch (e) {
    info.error = e.message;
  }

  return info;
}

function renderStore(storeInfo) {
  const card = el('div', { cls: 'store-card' });

  // En-tête
  const head = el('div', { cls: 'store-name' });
  head.appendChild(document.createTextNode('📦 store: "' + storeInfo.name + '"'));
  if (storeInfo.keyPath) {
    const tag = el('span', { cls: 'keypath-tag', text: 'keyPath: ' + storeInfo.keyPath });
    head.appendChild(tag);
  } else {
    const tag = el('span', { cls: 'keypath-tag', text: 'sans keyPath' });
    head.appendChild(tag);
  }
  if (storeInfo.count === 0) {
    head.appendChild(el('span', { cls: 'empty-tag', text: ' VIDE' }));
  } else {
    head.appendChild(el('span', { cls: 'full-tag', text: ' ' + storeInfo.count + ' éléments' }));
  }
  card.appendChild(head);

  if (storeInfo.error) {
    card.appendChild(el('div', {
      cls: 'row',
      html: '<span class="label">Erreur</span><span class="val crit">' + storeInfo.error + '</span>'
    }));
    return card;
  }

  // Lignes d'info
  const addRow = (label, val, cls) => {
    const row = el('div', { cls: 'row' });
    row.appendChild(el('span', { cls: 'label', text: label }));
    row.appendChild(el('span', { cls: 'val ' + (cls || ''), text: val }));
    card.appendChild(row);
  };

  addRow('keyPath', storeInfo.keyPath ? "'" + storeInfo.keyPath + "'" : '(null)', storeInfo.keyPath ? 'warn' : '');
  addRow('autoIncrement', String(storeInfo.autoIncrement));
  addRow('count', String(storeInfo.count), storeInfo.count === 0 ? 'crit' : 'ok');

  // Vérification clé cible pour store 'state'
  if (storeInfo.name === 'state') {
    const hasTargetKey = storeInfo.keys.includes(TARGET_SAVE_KEY);
    addRow('Contient "' + TARGET_SAVE_KEY + '"', hasTargetKey ? 'OUI' : 'NON', hasTargetKey ? 'ok' : 'crit');
  }

  // Toutes les clés
  if (storeInfo.keys.length > 0) {
    const det = el('details');
    det.appendChild(el('summary', { text: '🔑 Voir les ' + storeInfo.keys.length + ' clés' }));
    const pre = el('pre', { text: storeInfo.keys.join('\n') });
    det.appendChild(pre);
    card.appendChild(det);
  }

  // Premiers enregistrements
  if (storeInfo.samples.length > 0) {
    const det = el('details');
    det.appendChild(el('summary', { text: '📄 Voir les ' + storeInfo.samples.length + ' premiers enregistrements' }));
    const pre = el('pre', { text: jsonPreview(storeInfo.samples, 1500) });
    det.appendChild(pre);
    card.appendChild(det);
  }

  return card;
}

async function inspectDB(name) {
  const card = el('div', { cls: 'card' });
  card.appendChild(el('h2', { text: '🗄 Base : ' + name }));

  let db;
  try {
    db = await openDB(name);
  } catch (e) {
    card.appendChild(el('div', { cls: 'row', html: '<span class="label">Ouverture</span><span class="val crit">ÉCHEC: ' + e.message + '</span>' }));
    return card;
  }

  card.appendChild(el('div', { cls: 'row', html: '<span class="label">Ouverture</span><span class="val ok">OK</span>' }));
  card.appendChild(el('div', { cls: 'row', html: '<span class="label">Version</span><span class="val info">v' + db.version + '</span>' }));
  const stores = Array.from(db.objectStoreNames);
  card.appendChild(el('div', { cls: 'row', html: '<span class="label">Stores</span><span class="val info">' + stores.join(', ') + '</span>' }));

  for (const sname of stores) {
    const info = await inspectStore(db, sname);
    card.appendChild(renderStore(info));
  }

  db.close();
  return card;
}

async function refresh() {
  const allBases = await listAllDatabases();
  const allBasesEl = document.getElementById('all-bases');
  allBasesEl.innerHTML = '';
  if (allBases.length === 0) {
    allBasesEl.appendChild(el('div', { text: '(aucune base trouvée)' }));
  } else {
    for (const b of allBases) {
      const div = el('div', { cls: 'all-bases', text: '· ' + b.name + ' (v' + (b.version || '?') + ')' });
      allBasesEl.appendChild(div);
    }
  }

  const content = document.getElementById('content');
  content.innerHTML = '';

  // Inspecter la base cible
  const card = await inspectDB(TARGET_DB_NAME);
  content.appendChild(card);

  // Inspecter aussi les autres bases trouvées
  for (const b of allBases) {
    if (b.name && b.name !== TARGET_DB_NAME && !b.name.startsWith('(')) {
      const card = await inspectDB(b.name);
      content.appendChild(card);
    }
  }

  // Préparer le rapport pour copie
  generateReport();
}

async function generateReport() {
  const lines = [];
  lines.push('=== AURA · Inspect IDB · ' + new Date().toISOString() + ' ===');
  lines.push('');

  const allBases = await listAllDatabases();
  lines.push('Bases trouvées (via indexedDB.databases()) :');
  for (const b of allBases) {
    lines.push('  · ' + b.name + ' (v' + (b.version || '?') + ')');
  }
  lines.push('');

  const namesToInspect = [TARGET_DB_NAME];
  for (const b of allBases) {
    if (b.name && b.name !== TARGET_DB_NAME && !b.name.startsWith('(')) namesToInspect.push(b.name);
  }

  for (const name of namesToInspect) {
    lines.push('===== Base : ' + name + ' =====');
    try {
      const db = await openDB(name);
      lines.push('  Ouverture : OK');
      lines.push('  Version   : v' + db.version);
      const stores = Array.from(db.objectStoreNames);
      lines.push('  Stores    : ' + stores.join(', '));
      lines.push('');

      for (const sname of stores) {
        const info = await inspectStore(db, sname);
        lines.push('  --- Store "' + sname + '" ---');
        lines.push('  keyPath       : ' + (info.keyPath ? "'" + info.keyPath + "'" : '(null)'));
        lines.push('  autoIncrement : ' + info.autoIncrement);
        lines.push('  count         : ' + info.count);
        if (info.error) lines.push('  ERROR         : ' + info.error);
        if (sname === 'state') {
          const hasTarget = info.keys.includes(TARGET_SAVE_KEY);
          lines.push('  contient "' + TARGET_SAVE_KEY + '" : ' + (hasTarget ? 'OUI' : 'NON'));
        }
        if (info.keys.length > 0) {
          lines.push('  Clés (max 20) :');
          info.keys.forEach(k => lines.push('    · ' + k));
        }
        if (info.samples.length > 0) {
          lines.push('  Échantillon (premier élément) :');
          lines.push('  ' + jsonPreview(info.samples[0], 600).split('\n').join('\n  '));
        }
        lines.push('');
      }

      db.close();
    } catch (e) {
      lines.push('  ÉCHEC ouverture : ' + e.message);
      lines.push('');
    }
  }

  lastReport = lines.join('\n');
}

document.getElementById('btn-refresh').addEventListener('click', refresh);
document.getElementById('btn-copy').addEventListener('click', async () => {
  if (!lastReport) await generateReport();
  try {
    await navigator.clipboard.writeText(lastReport);
    alert('✓ Rapport copié dans le presse-papier.\n\nColle-le dans la conversation Claude.');
  } catch (e) {
    // Fallback : afficher dans un textarea sélectionnable
    const ta = document.createElement('textarea');
    ta.value = lastReport;
    ta.style.position = 'fixed';
    ta.style.top = '0';
    ta.style.left = '0';
    ta.style.width = '100%';
    ta.style.height = '50%';
    ta.style.zIndex = 9999;
    document.body.appendChild(ta);
    ta.select();
    alert('Sélectionne tout le texte (Cmd/Ctrl+A) et copie.');
  }
});

refresh();
</script>

</body>
</html>
