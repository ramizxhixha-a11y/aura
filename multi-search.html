<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA8 · Multi-Search v2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050709;
    color: #e6ebf5;
    font-family: -apple-system, system-ui, sans-serif;
    padding: 16px;
    min-height: 100vh;
    font-size: 13px;
  }
  h1 {
    font-size: 17px;
    color: #a855f7;
    letter-spacing: .06em;
    margin-bottom: 4px;
  }
  .sub { font-size: 11px; color: #9aa0a6; margin-bottom: 18px; }
  
  label {
    display: block;
    font-size: 10px;
    color: #9aa0a6;
    margin: 12px 0 4px;
    letter-spacing: .05em;
    text-transform: uppercase;
  }
  
  input[type=text] {
    width: 100%;
    padding: 10px 12px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 8px;
    color: #e6ebf5;
    font-size: 13px;
    font-family: 'SF Mono', monospace;
  }
  
  .quick-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  
  .quick-btn {
    padding: 6px 10px;
    background: rgba(168,85,247,.08);
    border: 1px solid rgba(168,85,247,.3);
    border-radius: 6px;
    color: #a855f7;
    font-size: 11px;
    cursor: pointer;
    font-family: 'SF Mono', monospace;
  }
  
  .filter-row {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }
  
  .filter-btn {
    flex: 1;
    padding: 8px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 6px;
    color: #9aa0a6;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
  }
  .filter-btn.active {
    background: rgba(168,85,247,.15);
    border-color: rgba(168,85,247,.5);
    color: #a855f7;
  }
  
  .btn-search {
    width: 100%;
    padding: 14px;
    margin: 16px 0;
    border-radius: 10px;
    border: 1.5px solid rgba(168,85,247,.5);
    background: rgba(168,85,247,.12);
    color: #a855f7;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: .05em;
  }
  .btn-search:disabled { opacity: .4; }
  
  .btn-dl-all {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1.5px solid rgba(245,200,66,.6);
    background: rgba(245,200,66,.12);
    color: #f5c842;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  
  #status {
    padding: 10px;
    background: rgba(255,255,255,.02);
    border-radius: 6px;
    margin-top: 12px;
    font-size: 11px;
    color: #9aa0a6;
    font-family: 'SF Mono', monospace;
  }
  
  .file-result {
    margin: 10px 0;
    background: rgba(255,255,255,.02);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 8px;
    padding: 10px;
  }
  .file-result.has-matches { border-color: rgba(0,232,122,.4); background: rgba(0,232,122,.04); }
  .file-result.no-matches { opacity: 0.4; }
  .file-result.error { border-color: rgba(255,61,107,.3); background: rgba(255,61,107,.04); }
  
  .file-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  
  .file-name {
    font-size: 12px;
    color: #38d4f5;
    font-family: 'SF Mono', monospace;
    font-weight: 600;
  }
  .file-name .type-badge {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 9px;
    margin-right: 4px;
    font-weight: 700;
  }
  .badge-html { background: rgba(245,200,66,.2); color: #f5c842; }
  .badge-js   { background: rgba(247,200,84,.18); color: #f7c854; }
  .badge-css  { background: rgba(56,212,245,.18); color: #38d4f5; }
  
  .file-count {
    font-size: 10px;
    color: #00e87a;
    font-weight: 700;
  }
  .file-count.zero { color: #666; }
  .file-count.error { color: #ff3d6b; }
  
  .preview {
    margin-top: 8px;
    background: #000;
    border-radius: 6px;
    padding: 8px;
    font-family: 'SF Mono', monospace;
    font-size: 9.5px;
    line-height: 1.5;
    color: #c0c0c0;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre;
    overflow-x: auto;
  }
  
  .match-line {
    background: rgba(245,200,66,.25);
    color: #f5c842;
    font-weight: 700;
  }
  
  .action-btns {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  
  .action-btn {
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    border: 1px solid;
  }
  .btn-dl-file {
    background: rgba(0,232,122,.12);
    border-color: rgba(0,232,122,.35);
    color: #00e87a;
  }
  
  .err { color: #ff3d6b; }
  .ok  { color: #00e87a; }
  .info { color: #38d4f5; }
  
  progress {
    width: 100%;
    height: 6px;
    margin-top: 8px;
  }
</style>
</head>
<body>

<h1>🔮 AURA8 · MULTI-SEARCH v2</h1>
<div class="sub">JS + HTML + CSS · 38 fichiers · filtres + parallèle</div>

<label>Mot-clé à chercher</label>
<input type="text" id="keyword" value="toggleSim" placeholder="ex: toggleSim, renderAll, cashVal, .btn-play">
<div class="quick-row">
  <button class="quick-btn" onclick="setKw('toggleSim')">toggleSim</button>
  <button class="quick-btn" onclick="setKw('renderAll')">renderAll</button>
  <button class="quick-btn" onclick="setKw('simulationPaused')">simulationPaused</button>
  <button class="quick-btn" onclick="setKw('loadState')">loadState</button>
  <button class="quick-btn" onclick="setKw('mainTick')">mainTick</button>
  <button class="quick-btn" onclick="setKw('cashVal')">cashVal</button>
  <button class="quick-btn" onclick="setKw('.btn-play-pause')">.btn-play-pause</button>
</div>

<label>Filtrer par type</label>
<div class="filter-row">
  <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">Tout (38)</button>
  <button class="filter-btn" id="filter-js" onclick="setFilter('js')">JS + HTML (13)</button>
  <button class="filter-btn" id="filter-css" onclick="setFilter('css')">CSS (25)</button>
</div>

<label>Contexte (lignes autour de chaque match)</label>
<input type="text" id="context" value="10">

<button class="btn-search" id="searchBtn" onclick="doSearch()">🔮 Chercher dans tous les fichiers</button>
<button class="btn-dl-all" id="dlAllBtn" onclick="downloadAll()" style="display:none;">💾 Tout télécharger en .txt</button>

<div id="status">Prêt. Tape un mot-clé, choisis un filtre, et lance.</div>
<progress id="progress" value="0" max="100" style="display:none;"></progress>

<div id="results"></div>

<script>
// ─── Liste exhaustive des fichiers à scanner ───────────────
const FILES_JS = [
  './AURA8_v118.html',
  './js/00-backup-state.js',
  './js/01-chrono-network.js',
  './js/02-state-init.js',
  './js/03-per-pair-position-buttons-controls-bui.js',
  './js/04-v8-0-livraison-35-mode-max-permissif-v.js',
  './js/05-v37-19-indicateur-de-fatigue-bot.js',
  './js/06-v63-patterns-chartistes.js',
  './js/07-v90-mode-bunker-sos.js',
  './js/08-learning-history-render.js',
  './js/09-bloc-restauration-v93.js',
  './js/10-fin-bloc-restauration-v93.js',
];

const FILES_CSS = [
  './css/01-base.css',
  './css/02-layout.css',
  './css/03-utils.css',
  './css/04-installer-bannière.css',
  './css/05-action-cards-base.css',
  './css/06-page-dashboard.css',
  './css/07-page-agents.css',
  './css/08-page-market.css',
  './css/09-page-dao.css',
  './css/10-page-chain.css',
  './css/11-page-fiscal.css',
  './css/12-page-positions.css',
  './css/13-v8-mood-brain-ticker.css',
  './css/14-v6-controls-pending.css',
  './css/15-v59-settings-modal.css',
  './css/16-v56-bot-fleet.css',
  './css/17-v55-swarm-21agents.css',
  './css/18-v54-dialogue-mirror.css',
  './css/19-v4x-action-cards-rich.css',
  './css/20-v712-stabilité.css',
  './css/21a-v712-controls-charts.css',
  './css/21b-v712-luminous-cards.css',
  './css/22-features-v16-v69.css',
  './css/23-circular-logo.css',
  './css/24-header-l1.css',
  './css/25-mode-trading.css',
];

// Noms alternatifs si tronqués/différents
const ALT_NAMES = {
  './js/03-per-pair-position-buttons-controls-bui.js': [
    './js/03-per-pair-position-buttons-controls-buil.js',
    './js/03-per-pair-position-buttons-controls-build.js',
    './js/03-per-pair-position-buttons-controls.js',
  ],
  './js/04-v8-0-livraison-35-mode-max-permissif-v.js': [
    './js/04-v8-0-livraison-35-mode-max-permissif.js',
  ],
};

let _currentFilter = 'all';
let _results = [];

function setKw(kw) { document.getElementById('keyword').value = kw; }

function setFilter(type) {
  _currentFilter = type;
  ['all', 'js', 'css'].forEach(t => {
    const btn = document.getElementById('filter-' + t);
    if (btn) btn.classList.toggle('active', t === type);
  });
}

function getFiles() {
  if (_currentFilter === 'js') return FILES_JS;
  if (_currentFilter === 'css') return FILES_CSS;
  return [...FILES_JS, ...FILES_CSS];
}

function getFileType(url) {
  if (url.endsWith('.html')) return 'html';
  if (url.endsWith('.js')) return 'js';
  if (url.endsWith('.css')) return 'css';
  return 'other';
}

async function fetchFile(url) {
  // Encoder l'URL pour gérer les accents (ex: bannière, stabilité)
  const encodedUrl = url.split('/').map((part, i, arr) => 
    i === arr.length - 1 ? encodeURIComponent(part) : part
  ).join('/');
  
  try {
    const r = await fetch(encodedUrl, { cache: 'no-cache' });
    if (!r.ok) {
      // Essayer les noms alternatifs
      if (ALT_NAMES[url]) {
        for (const altUrl of ALT_NAMES[url]) {
          try {
            const r2 = await fetch(altUrl, { cache: 'no-cache' });
            if (r2.ok) {
              return { ok: true, content: await r2.text(), actualUrl: altUrl };
            }
          } catch(e) {}
        }
      }
      return { ok: false, error: 'HTTP ' + r.status };
    }
    return { ok: true, content: await r.text(), actualUrl: url };
  } catch(e) {
    return { ok: false, error: e.message };
  }
}

async function doSearch() {
  const kw = document.getElementById('keyword').value.trim();
  const ctx = parseInt(document.getElementById('context').value, 10) || 10;
  const status = document.getElementById('status');
  const results = document.getElementById('results');
  const btn = document.getElementById('searchBtn');
  const dlAllBtn = document.getElementById('dlAllBtn');
  const progress = document.getElementById('progress');
  
  if (!kw) {
    status.innerHTML = '<span class="err">⚠ Mot-clé requis</span>';
    return;
  }
  
  const files = getFiles();
  
  btn.disabled = true;
  dlAllBtn.style.display = 'none';
  results.innerHTML = '';
  _results = [];
  progress.style.display = 'block';
  progress.value = 0;
  progress.max = files.length;
  status.textContent = '⏳ Scan parallèle de ' + files.length + ' fichiers...';
  
  // Lancer toutes les requêtes en parallèle
  let completed = 0;
  const promises = files.map(async (url) => {
    const res = await fetchFile(url);
    completed++;
    progress.value = completed;
    status.textContent = '⏳ [' + completed + '/' + files.length + '] traitement...';
    return { url, res };
  });
  
  const allResults = await Promise.all(promises);
  
  let totalMatches = 0;
  let filesWithMatches = 0;
  
  // Trier : matches d'abord, puis pas de matches, puis erreurs
  const sorted = allResults.map(({url, res}) => {
    const shortName = url.split('/').pop();
    const type = getFileType(url);
    
    if (!res.ok) {
      return { url, shortName, type, status: 'error', error: res.error, matchCount: 0 };
    }
    
    const lines = res.content.split('\n');
    const matches = [];
    for (let j = 0; j < lines.length; j++) {
      if (lines[j].includes(kw)) matches.push(j);
    }
    
    if (matches.length === 0) {
      return { url, shortName, type, status: 'no-matches', matchCount: 0 };
    }
    
    // Build preview (1er match)
    const firstMatch = matches[0];
    const start = Math.max(0, firstMatch - ctx);
    const end = Math.min(lines.length, firstMatch + ctx + 1);
    const blockLines = lines.slice(start, end);
    const previewHtml = blockLines.map((line, idx) => {
      const lineNum = start + idx + 1;
      const numStr = String(lineNum).padStart(5, ' ');
      let displayLine = escapeHtml(line);
      const reg = new RegExp(escapeRegex(kw), 'g');
      displayLine = displayLine.replace(reg, '<span class="match-line">' + escapeHtml(kw) + '</span>');
      return '<span style="color:#666;">' + numStr + '</span>  ' + displayLine;
    }).join('\n');
    
    // Build full text for download
    let fullText = '';
    for (let m of matches) {
      const s = Math.max(0, m - ctx);
      const e = Math.min(lines.length, m + ctx + 1);
      const bl = lines.slice(s, e);
      fullText += '\n━━━ Match line ' + (m+1) + ' ━━━\n\n';
      fullText += bl.map((l, idx) => String(s + idx + 1).padStart(5, ' ') + '  ' + l).join('\n');
      fullText += '\n';
    }
    
    return {
      url, shortName, type, status: 'has-matches',
      matchCount: matches.length, firstMatchLine: firstMatch + 1,
      previewHtml, fullText
    };
  });
  
  // Trier : has-matches > no-matches > error
  const order = { 'has-matches': 0, 'no-matches': 1, 'error': 2 };
  sorted.sort((a, b) => order[a.status] - order[b.status]);
  
  // Render
  sorted.forEach((r) => {
    const div = document.createElement('div');
    const badgeClass = 'badge-' + r.type;
    const badgeText = r.type.toUpperCase();
    
    if (r.status === 'has-matches') {
      _results.push(r);
      filesWithMatches++;
      totalMatches += r.matchCount;
      
      div.className = 'file-result has-matches';
      div.innerHTML = '<div class="file-header">' +
        '<div class="file-name"><span class="type-badge ' + badgeClass + '">' + badgeText + '</span>' + escapeHtml(r.shortName) + '</div>' +
        '<div class="file-count">✓ ' + r.matchCount + ' match(es)</div>' +
        '</div>' +
        '<div class="preview">' + r.previewHtml + '</div>' +
        '<div class="action-btns">' +
        '<button class="action-btn btn-dl-file" onclick="downloadOne(' + (_results.length-1) + ')">💾 .txt</button>' +
        '</div>';
    } else if (r.status === 'error') {
      div.className = 'file-result error';
      div.innerHTML = '<div class="file-header">' +
        '<div class="file-name"><span class="type-badge ' + badgeClass + '">' + badgeText + '</span>' + escapeHtml(r.shortName) + '</div>' +
        '<div class="file-count error">⚠ ' + escapeHtml(r.error) + '</div>' +
        '</div>';
    } else {
      div.className = 'file-result no-matches';
      div.innerHTML = '<div class="file-header">' +
        '<div class="file-name"><span class="type-badge ' + badgeClass + '">' + badgeText + '</span>' + escapeHtml(r.shortName) + '</div>' +
        '<div class="file-count zero">0 match</div>' +
        '</div>';
    }
    results.appendChild(div);
  });
  
  progress.style.display = 'none';
  
  if (filesWithMatches === 0) {
    status.innerHTML = '<span class="err">❌ Aucun fichier ne contient "' + escapeHtml(kw) + '"</span>';
  } else {
    status.innerHTML = '<span class="ok">✓ ' + filesWithMatches + ' fichier(s) · ' + 
                       totalMatches + ' match(es) au total pour "' + escapeHtml(kw) + '"</span>';
    dlAllBtn.style.display = 'block';
  }
  
  btn.disabled = false;
}

function downloadOne(idx) {
  const r = _results[idx];
  if (!r) return;
  const kw = document.getElementById('keyword').value.trim();
  const filename = (kw + '_in_' + r.shortName).replace(/[^\w.]/g, '_') + '.txt';
  const content = 
    '═══ AURA8 MULTI-SEARCH RESULT ═══\n' +
    'File: ' + r.url + '\n' +
    'Keyword: ' + kw + '\n' +
    'Type: ' + r.type.toUpperCase() + '\n' +
    'Matches: ' + r.matchCount + '\n' +
    'Date: ' + new Date().toISOString() + '\n' +
    '═════════════════════════════════\n' +
    r.fullText;
  downloadTxt(content, filename);
}

function downloadAll() {
  if (_results.length === 0) return;
  const kw = document.getElementById('keyword').value.trim();
  const filename = 'multisearch_' + kw.replace(/[^\w]/g, '_') + '.txt';
  let content = 
    '═══ AURA8 MULTI-SEARCH · ALL FILES ═══\n' +
    'Keyword: ' + kw + '\n' +
    'Filter: ' + _currentFilter + '\n' +
    'Total files with matches: ' + _results.length + '\n' +
    'Total matches: ' + _results.reduce((s,r) => s + r.matchCount, 0) + '\n' +
    'Date: ' + new Date().toISOString() + '\n' +
    '══════════════════════════════════════\n\n';
  
  _results.forEach(r => {
    content += '\n\n████████████████████████████████\n';
    content += '█ [' + r.type.toUpperCase() + '] ' + r.shortName + ' · ' + r.matchCount + ' match(es)\n';
    content += '████████████████████████████████\n';
    content += r.fullText;
  });
  
  downloadTxt(content, filename);
}

function downloadTxt(content, filename) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    URL.revokeObjectURL(url);
    document.body.removeChild(a);
  }, 100);
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
</script>

</body>
</html>
