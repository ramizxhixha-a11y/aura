<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA8 · Code Search v3</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050709;
    color: #e6ebf5;
    font-family: -apple-system, system-ui, sans-serif;
    padding: 16px;
    min-height: 100vh;
    font-size: 13px;
  }
  h1 {
    font-size: 17px;
    color: #38d4f5;
    letter-spacing: .06em;
    margin-bottom: 4px;
  }
  .sub { font-size: 11px; color: #9aa0a6; margin-bottom: 18px; }
  
  label {
    display: block;
    font-size: 10px;
    color: #9aa0a6;
    margin: 12px 0 4px;
    letter-spacing: .05em;
    text-transform: uppercase;
  }
  
  input[type=text] {
    width: 100%;
    padding: 10px 12px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 8px;
    color: #e6ebf5;
    font-size: 13px;
    font-family: 'SF Mono', monospace;
  }
  
  .quick-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  
  .quick-btn {
    padding: 6px 10px;
    background: rgba(56,212,245,.08);
    border: 1px solid rgba(56,212,245,.25);
    border-radius: 6px;
    color: #38d4f5;
    font-size: 11px;
    cursor: pointer;
    font-family: 'SF Mono', monospace;
  }
  
  .btn-search {
    width: 100%;
    padding: 14px;
    margin: 16px 0;
    border-radius: 10px;
    border: 1.5px solid rgba(0,232,122,.5);
    background: rgba(0,232,122,.1);
    color: #00e87a;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: .05em;
  }
  .btn-search:disabled { opacity: .4; }
  
  .btn-download-all {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1.5px solid rgba(245,200,66,.6);
    background: rgba(245,200,66,.12);
    color: #f5c842;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  
  #status {
    padding: 10px;
    background: rgba(255,255,255,.02);
    border-radius: 6px;
    margin-top: 12px;
    font-size: 11px;
    color: #9aa0a6;
    font-family: 'SF Mono', monospace;
  }
  
  .result {
    margin: 10px 0;
    background: rgba(255,255,255,.02);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 8px;
    padding: 10px;
  }
  
  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    gap: 6px;
    flex-wrap: wrap;
  }
  
  .result-line {
    font-size: 10px;
    color: #38d4f5;
    font-family: 'SF Mono', monospace;
    flex: 1;
    min-width: 100px;
  }
  
  .action-btns {
    display: flex;
    gap: 4px;
  }
  
  .action-btn {
    padding: 4px 9px;
    border-radius: 5px;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    border: 1px solid;
  }
  .btn-dl {
    background: rgba(0,232,122,.12);
    border-color: rgba(0,232,122,.35);
    color: #00e87a;
  }
  .btn-cp {
    background: rgba(168,85,247,.12);
    border-color: rgba(168,85,247,.35);
    color: #a855f7;
  }
  .action-btn.done {
    background: rgba(255,255,255,.08);
    border-color: rgba(255,255,255,.2);
    color: #fff;
  }
  
  pre {
    background: #000;
    border-radius: 6px;
    padding: 8px;
    overflow-x: auto;
    font-family: 'SF Mono', monospace;
    font-size: 9.5px;
    line-height: 1.5;
    color: #c0c0c0;
    max-height: 280px;
    overflow-y: auto;
    white-space: pre;
  }
  
  .match { 
    background: rgba(245,200,66,.25);
    color: #f5c842;
    font-weight: 700;
  }
  
  .err { color: #ff3d6b; }
  .ok  { color: #00e87a; }
  .info { color: #38d4f5; }
</style>
</head>
<body>

<h1>🔍 AURA8 · CODE SEARCH v3</h1>
<div class="sub">Fix CORS + Téléchargement en .txt pour envoi par pièce jointe</div>

<label>1. Fichier à fouiller (URL relative)</label>
<input type="text" id="url" value="./AURA8_v118.html">
<div class="quick-row">
  <button class="quick-btn" onclick="setUrl('./AURA8_v118.html')">📄 AURA8_v118.html</button>
  <button class="quick-btn" onclick="setUrl('./js/02-state-init.js')">📄 02-state-init.js</button>
  <button class="quick-btn" onclick="setUrl('./js/04-v8-0-livraison-35-mode-max-permissif-v.js')">📄 04-permissif</button>
</div>

<label>2. Mot-clé à chercher</label>
<input type="text" id="keyword" value="renderHome">
<div class="quick-row">
  <button class="quick-btn" onclick="setKw('renderHome')">renderHome</button>
  <button class="quick-btn" onclick="setKw('renderWallet')">renderWallet</button>
  <button class="quick-btn" onclick="setKw('updateHomeUI')">updateHomeUI</button>
  <button class="quick-btn" onclick="setKw('cashAccount')">cashAccount</button>
  <button class="quick-btn" onclick="setKw('tradingAccount')">tradingAccount</button>
  <button class="quick-btn" onclick="setKw('CAISSE')">CAISSE</button>
  <button class="quick-btn" onclick="setKw('BOT LOCK')">BOT LOCK</button>
  <button class="quick-btn" onclick="setKw('confirmTransfer')">confirmTransfer</button>
  <button class="quick-btn" onclick="setKw('transferFunds')">transferFunds</button>
</div>

<label>3. Lignes de contexte (mettre 5 si ça rame)</label>
<input type="text" id="context" value="8">

<button class="btn-search" id="searchBtn" onclick="doSearch()">🔍 Lancer la recherche</button>
<button class="btn-download-all" id="dlAllBtn" onclick="downloadAll()" style="display:none;">💾 Télécharger TOUS les résultats en .txt</button>

<div id="status">Prêt. Choisis un fichier, un mot-clé, et lance la recherche.</div>

<div id="results"></div>

<script>
function setUrl(path) {
  document.getElementById('url').value = path;
}
function setKw(kw) {
  document.getElementById('keyword').value = kw;
}

let _fileCache = {};
let _lastResults = []; // pour le téléchargement global

async function doSearch() {
  const url = document.getElementById('url').value.trim();
  const kw = document.getElementById('keyword').value.trim();
  const ctx = parseInt(document.getElementById('context').value, 10) || 8;
  const status = document.getElementById('status');
  const results = document.getElementById('results');
  const btn = document.getElementById('searchBtn');
  const dlAllBtn = document.getElementById('dlAllBtn');
  
  if (!url || !kw) {
    status.innerHTML = '<span class="err">⚠ URL et mot-clé requis</span>';
    return;
  }
  
  btn.disabled = true;
  dlAllBtn.style.display = 'none';
  results.innerHTML = '';
  _lastResults = [];
  status.textContent = '⏳ Téléchargement de ' + url + '...';
  
  try {
    let content;
    if (_fileCache[url]) {
      content = _fileCache[url];
      status.textContent = '⚡ Fichier en cache (' + content.length.toLocaleString() + ' chars) · recherche...';
    } else {
      const t0 = Date.now();
      const r = await fetch(url, { cache: 'no-cache' });
      if (!r.ok) throw new Error('HTTP ' + r.status + ' · fichier introuvable');
      content = await r.text();
      _fileCache[url] = content;
      const dt = Date.now() - t0;
      status.innerHTML = '<span class="ok">✓ Fichier chargé : ' + content.length.toLocaleString() + 
                         ' chars en ' + dt + 'ms · recherche...</span>';
    }
    
    const lines = content.split('\n');
    const matches = [];
    
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].includes(kw)) {
        matches.push(i);
      }
    }
    
    if (matches.length === 0) {
      status.innerHTML = '<span class="err">❌ Aucun match pour "' + kw + 
                         '" dans ' + lines.length.toLocaleString() + ' lignes</span>';
      btn.disabled = false;
      return;
    }
    
    // Group consecutive matches
    const groups = [];
    let curGroup = [matches[0]];
    for (let i = 1; i < matches.length; i++) {
      if (matches[i] - curGroup[curGroup.length-1] < ctx * 2) {
        curGroup.push(matches[i]);
      } else {
        groups.push(curGroup);
        curGroup = [matches[i]];
      }
    }
    groups.push(curGroup);
    
    // Limit display
    const displayGroups = groups.slice(0, 15);
    
    status.innerHTML = '<span class="ok">✓ ' + matches.length + ' match(es) trouvé(s) groupés en ' + 
                       groups.length + ' bloc(s) · affichage des ' + displayGroups.length + ' premiers</span>';
    
    let html = '';
    if (groups.length > 15) {
      html += '<div style="background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.3);border-radius:6px;padding:8px;margin-bottom:10px;font-size:11px;color:#f5c842;">⚠ ' + 
              groups.length + ' blocs trouvés, 15 affichés. Utilise "Télécharger TOUS" pour avoir tout.</div>';
    }
    
    // Build all results (for download)
    groups.forEach((group, gi) => {
      const start = Math.max(0, group[0] - ctx);
      const end = Math.min(lines.length, group[group.length-1] + ctx + 1);
      
      const blockLines = lines.slice(start, end);
      const blockText = blockLines.map((line, idx) => {
        const lineNum = start + idx + 1;
        return String(lineNum).padStart(5, ' ') + '  ' + line;
      }).join('\n');
      
      _lastResults.push({
        idx: gi,
        start: start + 1,
        end: end,
        occurrences: group.length,
        text: blockText
      });
    });
    
    // Render display groups only
    displayGroups.forEach((group, gi) => {
      const result = _lastResults[gi];
      const start = result.start - 1;
      const end = result.end;
      const blockLines = lines.slice(start, end);
      
      const highlighted = blockLines.map((line, idx) => {
        const lineNum = start + idx + 1;
        const numStr = String(lineNum).padStart(5, ' ');
        let displayLine = escapeHtml(line);
        const reg = new RegExp(escapeRegex(kw), 'g');
        displayLine = displayLine.replace(reg, '<span class="match">' + escapeHtml(kw) + '</span>');
        return '<span style="color:#666;">' + numStr + '</span>  ' + displayLine;
      }).join('\n');
      
      html += '<div class="result">';
      html += '<div class="result-header">';
      html += '<div class="result-line">📍 #' + (gi+1) + ' · lignes ' + 
              result.start + '-' + result.end + ' (' + result.occurrences + ' occ.)</div>';
      html += '<div class="action-btns">';
      html += '<button class="action-btn btn-dl" onclick="downloadOne(' + gi + ')">💾 .txt</button>';
      html += '<button class="action-btn btn-cp" onclick="copyOne(this, ' + gi + ')">📋</button>';
      html += '</div>';
      html += '</div>';
      html += '<pre>' + highlighted + '</pre>';
      html += '</div>';
    });
    
    results.innerHTML = html;
    dlAllBtn.style.display = 'block';
    btn.disabled = false;
    
  } catch(e) {
    let hint = '';
    if (e.message.includes('404')) {
      hint = '<br><span class="info">→ Fichier introuvable. Vérifie l\'URL.</span>';
    }
    status.innerHTML = '<span class="err">❌ Erreur: ' + escapeHtml(e.message) + '</span>' + hint;
    btn.disabled = false;
  }
}

function downloadOne(idx) {
  const r = _lastResults[idx];
  if (!r) return;
  const kw = document.getElementById('keyword').value.trim();
  const url = document.getElementById('url').value.trim();
  const filename = (kw + '_match' + (idx+1) + '_lines' + r.start + '-' + r.end).replace(/[^\w-]/g, '_') + '.txt';
  
  const content = 
    '═══ AURA8 CODE SEARCH RESULT ═══\n' +
    'File: ' + url + '\n' +
    'Keyword: ' + kw + '\n' +
    'Match #' + (idx+1) + ' · lines ' + r.start + '-' + r.end + ' · ' + r.occurrences + ' occurrences\n' +
    '═══════════════════════════════════\n\n' +
    r.text;
  
  downloadTxt(content, filename);
}

function downloadAll() {
  if (_lastResults.length === 0) return;
  const kw = document.getElementById('keyword').value.trim();
  const url = document.getElementById('url').value.trim();
  const filename = ('all_' + kw + '_in_' + url.replace(/^\.\//, '').replace(/[^\w]/g, '_')).slice(0, 80) + '.txt';
  
  let content = 
    '═══ AURA8 CODE SEARCH · ALL RESULTS ═══\n' +
    'File: ' + url + '\n' +
    'Keyword: ' + kw + '\n' +
    'Total matches: ' + _lastResults.reduce((s,r) => s + r.occurrences, 0) + '\n' +
    'Groups: ' + _lastResults.length + '\n' +
    'Date: ' + new Date().toISOString() + '\n' +
    '════════════════════════════════════════\n\n';
  
  _lastResults.forEach((r, i) => {
    content += '\n\n━━━ MATCH #' + (i+1) + ' · lines ' + r.start + '-' + r.end + 
               ' · ' + r.occurrences + ' occurrences ━━━\n\n';
    content += r.text;
  });
  
  downloadTxt(content, filename);
}

function downloadTxt(content, filename) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    URL.revokeObjectURL(url);
    document.body.removeChild(a);
  }, 100);
}

function copyOne(btn, idx) {
  const r = _lastResults[idx];
  if (!r) return;
  const ta = document.createElement('textarea');
  ta.value = r.text;
  ta.style.position = 'fixed';
  ta.style.top = '0';
  ta.style.left = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    btn.classList.add('done');
    btn.textContent = '✅';
    setTimeout(() => {
      btn.classList.remove('done');
      btn.textContent = '📋';
    }, 1500);
  } catch(e) {
    alert('Copie manuelle requise');
  }
  document.body.removeChild(ta);
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
</script>

</body>
</html>
