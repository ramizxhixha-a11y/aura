function log(msg, cls) {
  const el = document.getElementById('log');
  el.innerHTML += '<span class="' + (cls||'') + '">' + msg + '</span>\n';
}

async function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = () => reject(req.error);
  });
}

async function writeIDB(snap) {
  const db = await openDB();
  return new Promise((resolve) => {
    const tx = db.transaction(STORE, 'readwrite');
    const store = tx.objectStore(STORE);
    const req = store.put(snap, SAVE_KEY);
    req.onsuccess = () => { db.close(); resolve(true); };
    req.onerror = () => { db.close(); resolve(false); };
  });
}

async function doRestore() {
  document.getElementById('log').innerHTML = '';
  log('Démarrage restauration...');
  
  // 1. Ecrire dans localStorage
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(SNAP));
    log('✓ localStorage écrit · cycle=#' + SNAP.cycle, 'success');
  } catch(e) {
    log('✗ localStorage erreur: ' + e.message, 'error');
  }
  
  // 2. Ecrire dans IDB
  try {
    const ok = await writeIDB(SNAP);
    log(ok ? '✓ IDB écrit · cycle=#' + SNAP.cycle : '✗ IDB échec', ok ? 'success' : 'error');
  } catch(e) {
    log('✗ IDB erreur: ' + e.message, 'error');
  }

  // 3. Bloquer toute réécriture pendant 10 secondes via sessionStorage flag
  sessionStorage.setItem('aura_restore_lock', Date.now().toString());
  sessionStorage.setItem('aura_restore_cycle', '16520');
  log('✓ Verrou sessionStorage activé 10s', 'success');

  // 4. Vérification
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    const check = JSON.parse(raw);
    if (check && check.cycle === 16520) {
      log('✓ VÉRIFIÉ · cycle=' + check.cycle + ' portfolio=' + check.portfolio.toFixed(2), 'success');
    } else {
      log('✗ Vérification échouée · cycle=' + (check && check.cycle), 'error');
    }
  } catch(e) {
    log('✗ Vérification erreur: ' + e.message, 'error');
  }

  log('\n✅ RESTAURATION TERMINÉE\nOuvre AURA dans le même onglet ou appuie sur le bouton ci-dessus.', 'success');
}
