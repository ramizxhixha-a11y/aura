<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AURA · IDB Debug Viewer</title>
<style>
  :root {
    --bg: #0a0e14;
    --bg2: #11151c;
    --bg3: #161b25;
    --fg: #d8e0ec;
    --muted: #6b7682;
    --green: #00e87a;
    --red: #ff3d6b;
    --yellow: #ffd23f;
    --blue: #38d4f5;
    --purple: #b39ddb;
    --border: #1f2630;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    margin: 0; padding: 16px; min-height: 100vh; font-size: 14px;
  }
  h1 { color: var(--blue); font-size: 1.3rem; margin: 0 0 12px; text-align: center; }
  .info {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px;
    font-size: 0.85rem; color: var(--muted); margin-bottom: 12px;
  }
  .event {
    background: var(--bg2); border: 1px solid var(--border);
    border-left: 4px solid var(--muted);
    border-radius: 8px; padding: 10px 12px; margin: 6px 0;
    font-family: 'Courier New', monospace; font-size: 0.78rem;
  }
  .event.INIT, .event.WRAP_OPENDB, .event.WRAP_SAVESTATE { border-left-color: var(--purple); }
  .event.OPENDB_OK, .event.SAVESTATE_RESOLVED { border-left-color: var(--green); }
  .event.OPENDB_REJECT, .event.SAVESTATE_REJECT, .event.SAVESTATE_THROW, .event.OPENDB_THROW, .event.UNHANDLED_IDB_REJECTION { border-left-color: var(--red); background: rgba(255,61,107,0.06); }
  .event.SAVESTATE_NOT_ASYNC, .event.OPENDB_BAD_RETURN { border-left-color: var(--yellow); }
  .event.OPENDB_CALL, .event.SAVESTATE_CALL { border-left-color: var(--blue); }
  .event-type {
    color: var(--blue); font-weight: 600;
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    background: rgba(56,212,245,0.1);
    font-size: 0.7rem;
  }
  .event.OPENDB_REJECT .event-type,
  .event.SAVESTATE_REJECT .event-type,
  .event.SAVESTATE_THROW .event-type,
  .event.OPENDB_THROW .event-type,
  .event.UNHANDLED_IDB_REJECTION .event-type {
    color: var(--red); background: rgba(255,61,107,0.1);
  }
  .event.OPENDB_OK .event-type,
  .event.SAVESTATE_RESOLVED .event-type {
    color: var(--green); background: rgba(0,232,122,0.1);
  }
  .event-ts { color: var(--muted); font-size: 0.7rem; margin-left: 8px; }
  .event-body {
    margin-top: 6px; color: var(--fg);
    white-space: pre-wrap; word-break: break-all;
  }
  .err-name {
    display: inline-block; background: rgba(255,61,107,0.2);
    color: var(--red); padding: 2px 6px; border-radius: 4px;
    font-weight: 600;
  }
  button {
    width: 100%; padding: 14px; border-radius: 8px; border: none;
    font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px;
  }
  button.primary { background: var(--blue); color: #0a0e14; }
  button.ghost { background: transparent; border: 1px solid var(--border); color: var(--fg); }
  button.danger { background: var(--red); color: #fff; }
  .summary {
    background: rgba(56,212,245,0.08);
    border: 1px solid rgba(56,212,245,0.3);
    border-radius: 10px; padding: 12px; margin-bottom: 12px;
  }
  .summary-row {
    display: flex; justify-content: space-between;
    padding: 4px 0;
    font-family: 'Courier New', monospace; font-size: 0.85rem;
  }
  .summary-row .label { color: var(--muted); }
  .summary-row .val { color: var(--fg); }
  .summary-row .val.ok { color: var(--green); }
  .summary-row .val.crit { color: var(--red); }
  .empty {
    text-align: center; color: var(--muted);
    padding: 30px; font-style: italic;
  }
</style>
</head>
<body>

<h1>🔍 AURA · IDB Debug Viewer</h1>

<div class="info">
  Lit la clé localStorage <code>aura_idb_debug</code> écrite par le module
  <code>00z-idb-debug.js</code> chargé temporairement dans AURA. Affiche les
  événements en ordre chronologique inversé (plus récent en haut).
</div>

<div id="summary" class="summary" style="display:none"></div>

<button id="btn-refresh" class="primary">🔄 Rafraîchir</button>
<button id="btn-copy" class="ghost">📋 Copier rapport pour Claude</button>
<button id="btn-clear" class="danger">🗑 Vider les traces</button>

<div id="events"></div>

<script>
'use strict';
const KEY = 'aura_idb_debug';
let lastReport = '';

function $(id) { return document.getElementById(id); }

function loadEvents() {
  try {
    const raw = localStorage.getItem(KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch(e) {
    return [];
  }
}

function renderSummary(events) {
  const sum = $('summary');
  if (events.length === 0) {
    sum.style.display = 'none';
    return;
  }
  sum.style.display = 'block';

  const counts = {};
  events.forEach(e => counts[e.type] = (counts[e.type] || 0) + 1);

  const okCount = (counts.OPENDB_OK || 0) + (counts.SAVESTATE_RESOLVED || 0);
  const errCount = (counts.OPENDB_REJECT || 0) + (counts.OPENDB_THROW || 0) +
                   (counts.SAVESTATE_REJECT || 0) + (counts.SAVESTATE_THROW || 0) +
                   (counts.UNHANDLED_IDB_REJECTION || 0);

  let html = '';
  html += '<div class="summary-row"><span class="label">Total événements</span><span class="val">' + events.length + '</span></div>';
  html += '<div class="summary-row"><span class="label">openDB appelée</span><span class="val">' + (counts.OPENDB_CALL || 0) + ' fois</span></div>';
  html += '<div class="summary-row"><span class="label">openDB succès</span><span class="val ' + ((counts.OPENDB_OK||0)>0?'ok':'') + '">' + (counts.OPENDB_OK || 0) + '</span></div>';
  html += '<div class="summary-row"><span class="label">openDB échecs</span><span class="val ' + ((counts.OPENDB_REJECT||0)+(counts.OPENDB_THROW||0)>0?'crit':'') + '">' + ((counts.OPENDB_REJECT||0)+(counts.OPENDB_THROW||0)) + '</span></div>';
  html += '<div class="summary-row"><span class="label">saveState appelée</span><span class="val">' + (counts.SAVESTATE_CALL || 0) + ' fois</span></div>';
  html += '<div class="summary-row"><span class="label">saveState succès</span><span class="val ' + ((counts.SAVESTATE_RESOLVED||0)>0?'ok':'') + '">' + (counts.SAVESTATE_RESOLVED || 0) + '</span></div>';
  html += '<div class="summary-row"><span class="label">saveState échecs</span><span class="val ' + ((counts.SAVESTATE_REJECT||0)+(counts.SAVESTATE_THROW||0)>0?'crit':'') + '">' + ((counts.SAVESTATE_REJECT||0)+(counts.SAVESTATE_THROW||0)) + '</span></div>';

  sum.innerHTML = html;
}

function renderEvent(ev) {
  const div = document.createElement('div');
  div.className = 'event ' + (ev.type || 'UNKNOWN');

  const head = document.createElement('div');
  const type = document.createElement('span');
  type.className = 'event-type';
  type.textContent = ev.type || 'UNKNOWN';
  head.appendChild(type);

  if (ev.ts) {
    const ts = document.createElement('span');
    ts.className = 'event-ts';
    // Format court HH:MM:SS.mmm
    try {
      const d = new Date(ev.ts);
      const pad = (n,l) => String(n).padStart(l || 2, '0');
      ts.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds()) + '.' + pad(d.getMilliseconds(), 3);
    } catch(e) { ts.textContent = ev.ts; }
    head.appendChild(ts);
  }
  div.appendChild(head);

  const body = document.createElement('div');
  body.className = 'event-body';

  // Champs spéciaux
  const skip = ['type', 'ts'];
  const lines = [];
  for (const key of Object.keys(ev)) {
    if (skip.includes(key)) continue;
    const v = ev[key];
    if (key === 'error' && v && typeof v === 'object') {
      lines.push('error: ' + (v.name || 'Error') + ': ' + (v.message || '?'));
      if (v.stack) lines.push('  stack: ' + v.stack);
    } else if (typeof v === 'object' && v !== null) {
      lines.push(key + ': ' + JSON.stringify(v));
    } else {
      lines.push(key + ': ' + String(v));
    }
  }
  body.textContent = lines.join('\n');
  div.appendChild(body);

  return div;
}

function renderAll() {
  const events = loadEvents();
  renderSummary(events);

  const container = $('events');
  container.innerHTML = '';

  if (events.length === 0) {
    container.innerHTML = '<div class="empty">Aucune trace. Vérifie que 00z-idb-debug.js est bien chargé dans AURA8_v118.html.</div>';
    lastReport = 'AURA IDB Debug · ' + new Date().toISOString() + '\n\nAucune trace trouvée.';
    return;
  }

  // Plus récent en haut
  events.slice().reverse().forEach(ev => container.appendChild(renderEvent(ev)));

  // Préparer rapport texte
  const reportLines = ['AURA IDB Debug · ' + new Date().toISOString()];
  reportLines.push('Total: ' + events.length + ' événements');
  reportLines.push('');
  events.forEach(ev => {
    let line = '[' + (ev.ts || '?').substring(11, 23) + '] ' + (ev.type || '?');
    for (const key of Object.keys(ev)) {
      if (key === 'type' || key === 'ts') continue;
      const v = ev[key];
      if (key === 'error' && v && typeof v === 'object') {
        line += ' | error=' + (v.name || 'Error') + ': ' + (v.message || '?');
      } else if (typeof v === 'object' && v !== null) {
        line += ' | ' + key + '=' + JSON.stringify(v);
      } else {
        line += ' | ' + key + '=' + String(v);
      }
    }
    reportLines.push(line);
  });
  lastReport = reportLines.join('\n');
}

$('btn-refresh').addEventListener('click', renderAll);

$('btn-copy').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(lastReport);
    alert('Rapport copié.');
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = lastReport;
    ta.style.position = 'fixed';
    ta.style.top = '0'; ta.style.left = '0';
    ta.style.width = '100%'; ta.style.height = '50%';
    ta.style.zIndex = 9999;
    document.body.appendChild(ta);
    ta.select();
    alert('Sélectionne tout et copie.');
  }
});

$('btn-clear').addEventListener('click', () => {
  if (!confirm('Vider toutes les traces ?')) return;
  try {
    localStorage.removeItem(KEY);
    renderAll();
  } catch(e) {
    alert('Erreur : ' + e.message);
  }
});

renderAll();
</script>

</body>
</html>
