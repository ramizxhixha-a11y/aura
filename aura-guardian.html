<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA Guardian</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%2338d4f5'/%3E%3Cstop offset='100%25' stop-color='%2300e87a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='%230a0f18'/%3E%3Cpath d='M50 14 L80 26 V52 C80 70 66 82 50 88 C34 82 20 70 20 52 V26 Z' fill='none' stroke='url(%23g)' stroke-width='6'/%3E%3Cpath d='M36 51 L46 61 L66 39' fill='none' stroke='url(%23g)' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#050709;--card:#0a0f15;--card-hl:#0f161e;
    --border:rgba(56,212,245,.2);--border-h:rgba(56,212,245,.5);
    --ice:#38d4f5;--gold:#ffb830;--up:#00e87a;--down:#ff3d6b;
    --purple:#c084fc;--t1:#e8ecf1;--t2:#8a96a8;--t3:#4a5668;
    --mono:'Menlo','Monaco','SF Mono',monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;padding:12px;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5}
  header{background:linear-gradient(135deg,#0a0f15,#0f161e);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  h1{color:var(--ice);font-size:18px;margin:0;display:flex;align-items:center;gap:8px}
  .header-stats{display:flex;gap:12px;font-family:var(--mono);font-size:11px}
  .header-stats div{color:var(--t2)}.header-stats b{color:var(--ice)}
  .pulse{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--up);animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.2)}}
  .spinner{display:inline-block;width:11px;height:11px;border:2px solid var(--t3);border-top-color:var(--ice);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  .alert-bar{background:rgba(255,61,107,.1);border:1px solid var(--down);border-radius:8px;padding:10px 12px;margin-bottom:12px;display:none;font-size:12px}
  .alert-bar.show{display:block}.alert-bar .count{color:var(--down);font-weight:700}
  .panels{display:grid;grid-template-columns:1fr;gap:10px}
  @media(min-width:900px){.panels{grid-template-columns:1fr 1fr}}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .panel.alert{border-color:var(--down)}.panel.warn{border-color:var(--gold)}
  .panel.full{grid-column:1/-1}
  .panel-head{padding:10px 12px;background:var(--card-hl);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .panel-title{color:var(--gold);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
  .panel.alert .panel-title{color:var(--down)}.panel.warn .panel-title{color:var(--gold)}
  .panel-body{padding:10px 12px}
  .row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-family:var(--mono);font-size:11px;border-bottom:1px dashed rgba(74,86,104,.15);gap:8px}
  .row:last-child{border-bottom:none}.label{color:var(--t2)}.val{color:var(--t1);font-weight:700;text-align:right;word-break:break-all}
  .val.ok{color:var(--up)}.val.warn{color:var(--gold)}.val.crit{color:var(--down)}
  .val.empty,.val.muted{color:var(--t3);font-style:italic}.val.purple{color:var(--purple)}.val.info{color:var(--ice)}
  .item{padding:6px 8px;border-radius:6px;font-size:11px;margin:3px 0;display:flex;align-items:center;gap:8px;background:rgba(74,86,104,.08)}
  .item.ok{background:rgba(0,232,122,.06)}.item.warn{background:rgba(255,184,48,.08)}
  .item.crit{background:rgba(255,61,107,.1);border:1px solid var(--down)}
  .item .ic{flex:0 0 auto;font-size:13px}.item .nm{flex:1 1 auto;font-family:var(--mono);word-break:break-all}
  .item .tg{flex:0 0 auto;font-size:9px;color:var(--t3);font-family:var(--mono)}
  .item.ok .tg{color:var(--up)}.item.warn .tg{color:var(--gold)}.item.crit .tg{color:var(--down)}
  .sect-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t2);margin:12px 0 4px}
  .sect-label:first-child{margin-top:0}
  .outbox{background:#000;border:1px solid var(--border);border-radius:8px;padding:10px;font-family:var(--mono);font-size:10px;max-height:50vh;overflow-y:auto;white-space:pre-wrap;word-break:break-all;margin-top:8px}
  .log-entry{padding:2px 0}.log-time{color:var(--t3)}.log-ok{color:var(--up)}.log-warn{color:var(--gold)}
  .log-crit{color:var(--down)}.log-event{color:var(--ice)}.log-info{color:var(--t1)}.log-muted{color:var(--t3)}
  .log-tag{display:inline-block;padding:0 4px;border-radius:3px;font-size:9px;font-weight:700;margin-right:4px;background:rgba(74,86,104,.3);color:var(--t2)}
  .hit{background:rgba(255,184,48,.25);color:var(--gold);font-weight:700;border-radius:2px}
  .controls{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
  .controls.c3{grid-template-columns:1fr 1fr 1fr}
  .btn{background:rgba(56,212,245,.1);border:1px solid var(--ice);color:var(--ice);padding:9px 8px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
  .btn:hover{background:rgba(56,212,245,.2)}.btn:active{transform:scale(.97)}
  .btn.danger{background:rgba(255,61,107,.1);border-color:var(--down);color:var(--down)}
  .btn.danger:hover{background:rgba(255,61,107,.2)}
  .btn.gold{background:rgba(255,184,48,.1);border-color:var(--gold);color:var(--gold)}
  .btn.green{background:rgba(0,232,122,.1);border-color:var(--up);color:var(--up)}
  .btn.wide{grid-column:1/-1}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  input.gi,textarea.gi{width:100%;padding:9px 10px;background:#000;border:1px solid var(--border);border-radius:7px;color:var(--t1);font-family:var(--mono);font-size:12px;margin-top:6px}
  input.gi:focus,textarea.gi:focus{outline:none;border-color:var(--ice)}
  .toggle-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
  .toggle{flex:1;min-width:70px;background:var(--card-hl);border:1px solid var(--border);border-radius:7px;padding:8px;color:var(--t2);font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;text-align:center;user-select:none}
  .toggle.on{background:rgba(0,232,122,.12);border-color:rgba(0,232,122,.5);color:var(--up)}
  /* Home : grandes tuiles */
  .home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:12px}
  @media(min-width:700px){.home-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}}
  .tile{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .15s;position:relative;display:flex;flex-direction:column;gap:6px;min-height:96px}
  .tile:hover{border-color:var(--ice);background:rgba(56,212,245,.05)}
  .tile:active{transform:scale(.98)}
  .tile .tile-ic{font-size:24px;line-height:1}
  .tile .tile-nm{font-size:13px;font-weight:700;color:var(--t1)}
  .tile .tile-desc{font-size:10px;color:var(--t3);line-height:1.4}
  .tile .tile-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:700;min-width:16px;line-height:16px;text-align:center;border-radius:8px;padding:0 4px}
  .tile .tile-badge.crit{background:var(--down);color:#fff}
  .tile .tile-badge.warn{background:var(--gold);color:#000}
  /* page ouverte */
  .page-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .back-btn{background:rgba(56,212,245,.1);border:1px solid var(--ice);color:var(--ice);padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
  .back-btn:active{transform:scale(.97)}
  .page-title{font-size:15px;font-weight:700;color:var(--ice)}
  /* barre d'actions bas de page */
  .action-bar{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
  .action-bar .ab-label{width:100%;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:2px}
  .action-bar .btn{flex:1;min-width:90px}
  .hidden{display:none !important}
  .tab{padding:8px 6px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--t2);font-size:10.5px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1.2;min-height:46px;justify-content:center}
  .tab.active{color:var(--ice);border-color:var(--ice);background:rgba(56,212,245,.08)}

  .tab.has-alert .count{background:var(--down);color:#fff}.tab.has-warn .count{background:var(--gold);color:#000}
  .summary-bar{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap}
  .chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;font-family:var(--mono)}
  .chip.ok{background:rgba(0,232,122,.12);color:var(--up)}.chip.warn{background:rgba(255,184,48,.12);color:var(--gold)}
  .chip.crit{background:rgba(255,61,107,.12);color:var(--down)}
  .kwchip{display:inline-block;background:rgba(56,212,245,.08);border:1px solid rgba(56,212,245,.25);color:var(--ice);padding:4px 9px;border-radius:6px;font-family:var(--mono);font-size:10px;cursor:pointer;margin:3px 3px 0 0}
  .kwchip:active{transform:scale(.96)}
  .hint{font-size:10px;color:var(--t3);margin:4px 0 8px;line-height:1.4}
  details{margin-top:6px;background:rgba(74,86,104,.05);border-radius:6px;padding:6px 8px}
  details summary{cursor:pointer;color:var(--t2);font-size:10px;font-weight:700}
  details[open] summary{color:var(--ice)}
  details pre{margin:6px 0 0;font-size:9px;color:var(--t2);white-space:pre-wrap;word-break:break-all;max-height:240px;overflow-y:auto}
  .footer{margin-top:16px;padding-top:10px;border-top:1px solid var(--border);color:var(--t3);font-size:10px;text-align:center}
  .bar{height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin-top:8px;overflow:hidden}
  .bar-inner{height:100%;background:var(--ice);width:0;transition:width .2s}
</style>
</head>

<header>
  <h1><svg viewBox="0 0 100 100" width="1em" height="1em" style="vertical-align:-0.15em;display:inline-block" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="gdnSh" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#38d4f5"/><stop offset="100%" stop-color="#00e87a"/></linearGradient></defs><path d="M50 8 L84 22 V52 C84 72 68 86 50 92 C32 86 16 72 16 52 V22 Z" fill="none" stroke="url(#gdnSh)" stroke-width="7"/><path d="M34 50 L46 62 L68 36" fill="none" stroke="url(#gdnSh)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/></svg> AURA Guardian <span style="font-size:10px;color:var(--t3);font-weight:400">unifi&eacute;</span></h1>
  <div class="header-stats">
    <div>Mode: <b id="hs-mode">&mdash;</b></div>

<div class="alert-bar" id="alertBar">

<script>
'use strict';
/* ============================================================
   AURA GUARDIAN — outil unifié complet
   Intègre la logique réelle et entière de :
   multi-search, code-search, inspect-idb, idb-debug-viewer,
   test-idb-v3/write, clean-storage, restore-tool, recovery,
   force-restore, clear-sw, unregister-sw.
   + 3 modules : Inventaire & cohérence, Bugs connus, Déploiement.
   ============================================================ */

/* ---- Constantes système (vérifiées dans le repo) ---- */
const SAVE_KEY    = 'nexus_state_v2';
const DB_NAME     = 'NEXUS_DB';
const DB_VERSION  = 3;
const STORE       = 'state';
const STORE_TRADES= 'trades';
const STORE_FEES  = 'fees';
const APP_URL     = 'AURA8_v118.html';
const IDB_DEBUG_KEY = 'aura_idb_debug';

/* ---- Listes de fichiers (depuis le HTML, exhaustives) ---- */
// FILES = liste de référence (FALLBACK si le HTML d'AURA est injoignable).
// Au démarrage, syncFilesFromHTML() la remplace par la VRAIE liste extraite
// des balises <script>/<link> du HTML d'AURA → plus jamais de désync.
let FILES = {
  html: ['AURA8_v118.html'],
  css: [
    '01-base.css','02-layout.css','03-utils.css','04-install-banner.css',
    '05-action-cards-base.css','06-page-dashboard.css','07-page-agents.css',
    '08-page-market.css','09-page-dao.css','10-page-chain.css',
    '11-page-fiscal.css','12-page-positions.css','13-v8-mood-brain-ticker.css',
    '14-v6-controls-pending.css','15-v59-settings-modal.css','16-v56-bot-fleet.css',
    '17-v55-swarm-21agents.css','18-v54-dialogue-mirror.css','19-v4x-action-cards-rich.css',
    '20-v712-stability.css','21a-v712-controls-charts.css','21b-v712-luminous-cards.css',
    '22-features-v16-v69.css','23-circular-logo.css','24-header-l1.css',
    '25-mode-trading.css','25-settings-redesign.css'
  ],
  js: [
    '00-backup-state.js','00b-persistance-override.js','01-chrono-network.js','02-state-init.js',
    '03-per-pair-position-buttons-controls-buid.js','04-v8-0-livraison-35-mode-max-permissif-v.js',
    '05-v37-19-indicateur-de-fatigue-bot.js','06-v63-patterns-chartistes.js','07-v90-mode-bunker-sos.js',
    '08-learning-history-render.js','09a-runtime-state.js','09b1-build-snapshot.js','09b2-save-load.js',
    '09b3-import-export.js','09c-auto-open.js','09d1-paper-real-core.js','09d2-paper-real-stats.js',
    '09e-guards.js','09f1-bricks-action.js','09f2-bricks-man.js','09f3-bricks-pair.js','09f4-bricks-utils.js',
    '09g-modals.js','09h-exports.js','09i-sim-control.js','09j-helpers.js','09k-init.js',
    '09l-window-bridge.js','10-fin-bloc-restauration-v93.js'
  ]
};
// Normalise le fallback en CHEMINS COMPLETS (cohérent avec syncFilesFromHTML).
// Si le HTML est injoignable, on teste les fichiers au bon endroit (css/ et js/).
FILES.css = FILES.css.map(f => /^\.?\//.test(f) ? f : './css/'+f);
FILES.js  = FILES.js.map(f => /^\.?\//.test(f) ? f : './js/'+f);
FILES.html = FILES.html.map(f => /^\.?\//.test(f) ? f : './'+f);

// Synchronise FILES avec la VRAIE liste chargée par AURA (source de vérité = le HTML).
// Lit le HTML d'AURA, extrait les <script src> et <link href>, et reconstruit FILES.
// Si AURA est injoignable, on garde la liste de fallback ci-dessus.
async function syncFilesFromHTML(){
  try {
    const r = await fetch('./AURA8_v118.html', { cache:'no-store' });
    if(!r.ok) return false;
    const html = await r.text();
    const scripts = [...html.matchAll(/<script[^>]+src=["']([^"']+\.js)["']/gi)].map(m=>m[1]);
    const links   = [...html.matchAll(/<link[^>]+href=["']([^"']+\.css)["']/gi)].map(m=>m[1]);
    // garder le CHEMIN COMPLET réel tel que déclaré dans le HTML (racine, js/, css/…),
    // normalisé en './xxx'. C'est ce que l'app charge vraiment → on teste exactement ça.
    const norm = u => { u=u.split('?')[0]; if(/^\.?\//.test(u)) return u.replace(/^\.?\//,'./'); return './'+u; };
    const js  = scripts.filter(u=>!/^https?:/.test(u)).map(norm);
    const css = links.filter(u=>!/^https?:/.test(u)).map(norm);
    if(js.length){ FILES.js = js; }
    if(css.length){ FILES.css = css; }
    jlog && jlog('ok','SYNC','Liste fichiers synchronisée avec AURA : '+FILES.js.length+' JS · '+FILES.css.length+' CSS');
    return true;
  } catch(e){ return false; }
}

/* ---- Clés candidates pour la récupération (recovery.html) ---- */
const LS_CANDIDATE_KEYS = [
  'nexus_state_v2','nexus_state','nexusSnap_A','nexusSnap_B','nexusSnap_C',
  'nexusSnap_a','nexusSnap_b','nexusSnap_latest','nexusSnap_current',
  'nexusInternal_1','nexusInternal_2',
  'aura_autobackup_daily_0','aura_autobackup_daily_1','aura_autobackup_daily_2',
  'aura_last_auto_backup_date','aura_backup_manual'
];
const OBSOLETE_KEYS = ['nexusInternal_1','nexusSnap_A'];

/* ---- Fonctions critiques (référence -> fichier) ---- */
const REF_FUNCTIONS = [
  {fn:'loadState',file:'09b2-save-load.js'},{fn:'saveState',file:'09b2-save-load.js'},
  {fn:'buildSnapshot',file:'09b1-build-snapshot.js'},{fn:'renderAll',file:'02-state-init.js'},
  {fn:'renderHome',file:'07-v90-mode-bunker-sos.js'},{fn:'renderHomePrices',file:'07-v90-mode-bunker-sos.js'},
  {fn:'simTick',file:'08-learning-history-render.js'},{fn:'openPosition',file:'02-state-init.js'},
  {fn:'closePosition',file:'02-state-init.js'},{fn:'triggerEvolution',file:'07-v90-mode-bunker-sos.js'},
  {fn:'_checkAndRotatePeriods',file:'10-fin-bloc-restauration-v93.js'},{fn:'activateBunker',file:'07-v90-mode-bunker-sos.js'},
  {fn:'enableFullPowerMode',file:'04-v8-0-livraison-35-mode-max-permissif-v.js'},{fn:'confirmSwitchToReal',file:'02-state-init.js'}
];
const REF_DOM = ['heroVal','cashVal','cashPct','tradVal','tradPct','tradHealthSub','levReserveVal','fiscalResVal','ownFundsVal','cyclePhase'];
const REF_CAPABILITIES = [
  {key:'bunker',label:'Mode Bunker SOS',path:s=>s&&s._bunker&&s._bunker.active},
  {key:'fullpower',label:'Plein R\u00e9gime',path:s=>s&&s.fullPowerMode===true},
  {key:'realmode',label:'Mode R\u00e9el actif',path:s=>s&&s.tradingMode==='real'},
  {key:'abtesting',label:'A/B Testing',path:s=>s&&s.abTesting&&((s.abTesting.armA&&s.abTesting.armA.trades>0)||(s.abTesting.armB&&s.abTesting.armB.trades>0))}
];

/* ---- Catalogue des bugs connus + détection live ---- */
const REF_BUGS = [
  {id:'BUG-001',nom:'R\u00e9gression cycle au reload',statut:'r\u00e9solu',fichier:'00b-persistance-override.js',prio:'\u2014',
   desc:'L\'app perdait des cycles apr\u00e8s fermeture/r\u00e9ouverture. R\u00e9solu par anti-r\u00e9gression au load.',
   detect:c=>{if(c.lsCycle!=null&&c.idbCycle!=null){const d=Math.abs(c.lsCycle-c.idbCycle);if(d>20)return{hit:true,info:'\u00e9cart LS/IDB = '+d+' cycles'};}return{hit:false,info:'\u00e9cart LS/IDB faible, pas de r\u00e9gression'};}},
  {id:'BUG-002',nom:'Plein R\u00e9gime : d\u00e9sactivation incompl\u00e8te',statut:'en attente',fichier:'04-v8-0-livraison-35-mode-max-permissif-v.js',prio:'P2',
   desc:'D\u00e9sactivation incompl\u00e8te : snapshot agents non restaur\u00e9, flags non reset, botAutoMode non touch\u00e9.',
   detect:c=>{if(c.S&&c.S.fullPowerMode===true)return{hit:true,info:'fullPowerMode=true actuellement actif'};const code=c.code&&c.code['04-v8-0-livraison-35-mode-max-permissif-v.js'];if(code){const m=code.match(/function enableFullPowerMode[\s\S]*?\n\}/);const body=m?m[0]:'';if(/botAutoMode\s*=\s*true/.test(body))return{hit:true,info:'enableFullPowerMode() force botAutoMode=true (interdit) \u2192 \u00e0 retirer'};}return{hit:false,info:'Plein R\u00e9gime inactif, code sans for\u00e7age botAutoMode'};}},
  {id:'BUG-003',nom:'D\u00e9sync mode UI/storage',statut:'r\u00e9solu',fichier:'00b-persistance-override.js',prio:'\u2014',

function fmtBytes(n){if(n==null)return '\u2014';if(n<1024)return n+' o';if(n<1048576)return (n/1024).toFixed(1)+' Ko';return (n/1048576).toFixed(2)+' Mo';}

/* ---- IDB helpers (ouverture fidèle v3 avec les 3 stores) ---- */
function openDBNamed(name,version){
  return new Promise((resolve)=>{
    let req;
    try{req=version?indexedDB.open(name,version):indexedDB.open(name);}catch(e){return resolve(null);}
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>resolve(null);
    req.onblocked=()=>resolve(null);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(STORE_TRADES)){const ts=db.createObjectStore(STORE_TRADES,{keyPath:'id',autoIncrement:true});try{ts.createIndex('pair','pair',{unique:false});ts.createIndex('time','time',{unique:false});}catch(x){}}
      if(!db.objectStoreNames.contains(STORE_FEES))db.createObjectStore(STORE_FEES,{autoIncrement:true});
      if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE,{keyPath:'key'});
    };
    setTimeout(()=>resolve(null),4000);
  });
}
function idbGet(db,store,key){
  return new Promise((resolve)=>{
    let tx;try{tx=db.transaction(store,'readonly');}catch(e){return resolve(null);}
    const r=tx.objectStore(store).get(key);
    r.onsuccess=()=>resolve(r.result);r.onerror=()=>resolve(null);
  });
}
function listDatabases(){
  if(typeof indexedDB.databases==='function'){return indexedDB.databases().catch(()=>[{name:DB_NAME}]);}
  return Promise.resolve([{name:DB_NAME},{name:'aura_backups'}]);
}

   COLLECTEUR D'ÉTAT (LS + IDB), partagé par tous les modules
   ============================================================ */
const CTX={loaded:false,lsRaw:null,idbRaw:null,lsSnap:null,idbSnap:null,S:null,lsCycle:null,idbCycle:null,lsSavedAt:null,idbSavedAt:null,lsSize:null,idbSize:null,source:null};
async function collectState(){
  CTX.loaded=false;
  CTX.lsRaw=lsGet(SAVE_KEY);CTX.lsSnap=CTX.lsRaw?safeParse(CTX.lsRaw):null;
  CTX.lsSize=CTX.lsRaw?CTX.lsRaw.length:null;
  CTX.lsCycle=CTX.lsSnap&&typeof CTX.lsSnap.cycle==='number'?CTX.lsSnap.cycle:null;
  CTX.lsSavedAt=CTX.lsSnap&&CTX.lsSnap.savedAt?CTX.lsSnap.savedAt:null;
  try{
    const db=await openDBNamed(DB_NAME,DB_VERSION);
    if(db){const v=await idbGet(db,STORE,SAVE_KEY);
      if(v){CTX.idbSnap=(typeof v==='string')?safeParse(v):v;CTX.idbRaw=(typeof v==='string')?v:JSON.stringify(v);
        CTX.idbSize=CTX.idbRaw?CTX.idbRaw.length:null;
        CTX.idbCycle=CTX.idbSnap&&typeof CTX.idbSnap.cycle==='number'?CTX.idbSnap.cycle:null;
        CTX.idbSavedAt=CTX.idbSnap&&CTX.idbSnap.savedAt?CTX.idbSnap.savedAt:null;}
      try{db.close();}catch(e){}}
  }catch(e){jlog('warn','IDB','collect: '+(e&&e.message||e));}
  const lc=CTX.lsCycle!=null?CTX.lsCycle:-1, ic=CTX.idbCycle!=null?CTX.idbCycle:-1;
  if(ic>=lc&&CTX.idbSnap){CTX.S=CTX.idbSnap;CTX.source='IndexedDB';}
  else if(CTX.lsSnap){CTX.S=CTX.lsSnap;CTX.source='localStorage';}
  else{CTX.S=null;CTX.source='aucune';}
  CTX.loaded=true;return CTX;
}

  if(meta.actions && meta.actions.length){

      const lbl={reload:'↻ Recharger',json:'⬇ JSON',text:'⬇ Texte',backup:'⬇ Backup',import:'⬆ Importer'}[a];

function runPageAction(id, act){
  if(act==='reload'){ openPage(id); return; }

  if(act==='text' && pa.text){ const d=pa.text(); dlFile(d.content, d.name, 'text/plain'); return; }
  if(act==='backup' && pa.backup){ const d=pa.backup(); dlFile(d.content, d.name, 'application/json'); return; }
  // fallback générique : exporter ce que la page a produit
  alert('Aucune donnée à exporter pour cette action sur cette page (lance d\'abord l\'outil).');
}
function dlFile(content, filename, type){

async function runDeployCheck(){
  jlog('event','DEPLOY','V\u00e9rification du d\u00e9ploiement');
  const out={ts:Date.now(),app:null,files:[],note:''};
  const appR=await fetchHead(APP_URL);out.app={ok:appR.ok,status:appR.status};
  if(!_invResults)await runInventory();

  const miss=out.files.filter(f=>!f.ok);

  else out.note='L\'app ne r\u00e9pond pas (HTTP '+out.app.status+').';

  switchTab('deploy');
}

/* ============================================================
   INSPECTEUR IDB (logique complète de inspect-idb.html)
   ============================================================ */
async function inspectStoreFull(db,storeName){
  const info={name:storeName,keyPath:null,autoIncrement:false,count:0,keys:[],samples:[],error:null};
  try{
    const tx=db.transaction(storeName,'readonly');const store=tx.objectStore(storeName);
    info.keyPath=store.keyPath;info.autoIncrement=store.autoIncrement;
    info.count=await new Promise((res,rej)=>{const r=store.count();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
    info.keys=await new Promise((res,rej)=>{const r=store.getAllKeys();r.onsuccess=()=>res((r.result||[]).slice(0,20).map(k=>typeof k==='string'?k:JSON.stringify(k)));r.onerror=()=>rej(r.error);});
    info.samples=await new Promise((res,rej)=>{const r=store.getAll(undefined,3);r.onsuccess=()=>res((r.result||[]).map(item=>{
      if(item&&typeof item==='object'){const s={__type:'object'};['key','cycle','tradingMode','botAutoMode','savedAt','portfolio','cashAccount','tradingAccount','version','id','pair','time'].forEach(k=>{if(k in item)s[k]=item[k];});s.__totalKeys=Object.keys(item).length;return s;}return item;}));r.onerror=()=>rej(r.error);});
  }catch(e){info.error=e.message;}
  return info;
}

      html+=rowKV('Stores',stores.join(', ')||'(aucun)','info');

      for(const sn of stores){
        const si=await inspectStoreFull(db,sn);
        let lvl=si.error?'crit':(si.count===0?'warn':'ok');

        html+='<div style="display:flex;gap:8px"><span class="nm" style="font-weight:700">\ud83d\udce6 '+sn+'</span><span class="tg">'+(si.keyPath?('keyPath:'+si.keyPath):'sans keyPath')+'</span></div>';

        if(sn===STORE){const has=si.keys.includes(SAVE_KEY);html+='<div style="font-size:10px;color:'+(has?'var(--up)':'var(--down)')+'">contient "'+SAVE_KEY+'" : '+(has?'OUI':'NON')+'</div>';}

        if(si.samples.length)html+='<details><summary>\ud83d\udcc4 '+si.samples.length+' \u00e9chantillon(s)</summary><pre>'+escapeHtml(JSON.stringify(si.samples,null,2))+'</pre></details>';
        html+='</div>';
        lines.push('  --- '+sn+' --- keyPath='+(si.keyPath||'(null)')+' count='+si.count+(sn===STORE?(' contient '+SAVE_KEY+'='+(si.keys.includes(SAVE_KEY)?'OUI':'NON')):''));
      }
      try{db.close();}catch(e){}
    }
    content.innerHTML=html;lastReport=lines.join('\n');

    jlog('ok','IDB','Inspection termin\u00e9e');
  };

  h+='<div class="controls"><button class="btn green wide" id="itRun">&#9654; Lancer le test</button></div>';

  h+='</div></div></div>';return h;

VIEW_INIT.idbtest=function(){
  const TEST_KEY='__aura_idb_test2__';
  const stepsEl=()=>document.getElementById('itSteps');const concEl=()=>document.getElementById('itConc');
  let report=[];
  function step(title,status,detail,err){
    const lvl=status==='ok'?'ok':'crit';const ic=status==='ok'?'\u2705':'\ud83d\udd34';
    let x='<div class="item '+lvl+'" style="flex-direction:column;align-items:stretch;gap:2px"><div style="display:flex;gap:8px"><span class="ic">'+ic+'</span><span class="nm">'+title+'</span></div>';
    if(detail)x+='<div style="font-size:10px;color:var(--t2)">'+escapeHtml(detail)+'</div>';
    if(err)x+='<div style="font-size:10px;color:var(--down)">'+escapeHtml((err.name||'Error')+': '+(err.message||err))+'</div>';
    x+='</div>';stepsEl().innerHTML+=x;
    let l=(status==='ok'?'[OK] ':'[FAIL] ')+title;if(detail)l+=' | '+detail;if(err)l+=' | '+(err.name||'Error')+': '+(err.message||err);report.push(l);
  }
  function conclusion(type,msg){concEl().innerHTML='<div class="item '+(type==='ok'?'ok':'crit')+'" style="line-height:1.5;margin-top:8px">'+escapeHtml(msg)+'</div>';report.push('','CONCLUSION: '+msg);jlog(type==='ok'?'ok':'crit','IDBTEST',msg);}
  async function run(){
    stepsEl().innerHTML='';concEl().innerHTML='';report=['AURA IDB Test '+new Date().toISOString()];
    let db,keyPath;
    db=await openDBNamed(DB_NAME,DB_VERSION);
    if(!db){step('1. Ouverture v'+DB_VERSION,'err',null,new Error('open failed'));return conclusion('err','\u00c9chec ouverture IDB.');}
    step('1. Ouverture v'+DB_VERSION,'ok','v'+db.version+', stores: ['+Array.from(db.objectStoreNames).join(', ')+']');
    try{const tx=db.transaction(STORE,'readonly');const s=tx.objectStore(STORE);keyPath=s.keyPath;step('2. Examiner store state','ok','keyPath: '+(keyPath?('"'+keyPath+'"'):'(null)')+', autoIncrement: '+s.autoIncrement);}
    catch(e){step('2. Examiner store state','err',null,e);try{db.close();}catch(x){}return conclusion('err','Examen impossible.');}
    const snap={cycle:99998,tradingMode:'test',savedAt:new Date().toISOString(),portfolio:0,__test:true};
    let methode;if(keyPath){if(!snap.key)snap.key=TEST_KEY;methode='.put(snap)';}else methode='.put(snap,"'+TEST_KEY+'")';
    try{await new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');const s=tx.objectStore(STORE);let r;try{r=keyPath?s.put(snap):s.put(snap,TEST_KEY);}catch(e){return rej(e);}r.onsuccess=()=>res();r.onerror=()=>rej(r.error);tx.onerror=()=>rej(tx.error);tx.onabort=()=>rej(tx.error);});step('3. \u00c9criture (.put)','ok','M\u00e9thode: '+methode);}
    catch(e){step('3. \u00c9criture (.put)','err','M\u00e9thode: '+methode,e);try{db.close();}catch(x){}return conclusion('err','\u00c9criture plante : '+(e.name||'Error'));}
    try{const rb=await new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const r=tx.objectStore(STORE).get(TEST_KEY);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
      if(rb)step('4. Relecture .get','ok','cycle='+rb.cycle+', mode='+rb.tradingMode);else{step('4. Relecture .get','err','get('+TEST_KEY+') retourne null');try{db.close();}catch(x){}return conclusion('err','\u00c9crit mais get null : probl\u00e8me de cl\u00e9.');}}
    catch(e){step('4. Relecture .get','err',null,e);try{db.close();}catch(x){}return conclusion('err','Lecture \u00e9choue.');}
    try{await new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(TEST_KEY);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});step('5. Nettoyage','ok','Entr\u00e9e test supprim\u00e9e');}
    catch(e){step('5. Nettoyage','err','Entr\u00e9e test reste',e);}
    try{db.close();}catch(x){}
    conclusion('ok','\u00c9criture/lecture IDB v'+DB_VERSION+' fonctionnent. Si AURA \u00e9choue \u00e0 sauvegarder, le probl\u00e8me est dans 09b2.saveState ou window.openDB, pas dans IDB lui-m\u00eame.');
  }
  const b=document.getElementById('itRun');if(b)b.onclick=run;
};

VIEW_INIT.restore=function(){
  const logEl=()=>document.getElementById('reLog');
  function log(msg,cls){const e=logEl();if(!e)return;e.innerHTML+='\n'+(cls?'<span class="log-'+cls+'">'+escapeHtml(msg)+'</span>':escapeHtml(msg));e.scrollTop=e.scrollHeight;}
  function logClear(){const e=logEl();if(e)e.innerHTML='';}
  function snapInfo(s){if(!s)return null;return {cycle:typeof s.cycle==='number'?s.cycle:null,savedAt:s.savedAt||null,size:JSON.stringify(s).length,portfolio:s.portfolio,cash:s.cashAccount,trading:s.tradingAccount};}
  function fmtInfo(i){if(!i)return 'invalide';const p=[];if(i.cycle!=null)p.push('cycle=#'+i.cycle);if(i.savedAt)p.push('savedAt='+String(i.savedAt).slice(0,19).replace('T',' '));if(i.portfolio!=null)p.push('portfolio='+Number(i.portfolio).toFixed(2));p.push('size='+(i.size/1024).toFixed(1)+' Ko');return p.join(' \u00b7 ');}

  async function scan(){
    logClear();_bestSnap=null;
    document.getElementById('reRestore').disabled=true;document.getElementById('reExport').disabled=true;
    document.getElementById('reCandidates').innerHTML='';
    log('\u2550\u2550\u2550 SCAN TOUTES SOURCES \u2550\u2550\u2550','event');
    const all=[];
    // localStorage clés candidates
    log('\n\u25b6 localStorage (cl\u00e9s candidates)','info');
    const known=new Set(LS_CANDIDATE_KEYS);
    for(const k of LS_CANDIDATE_KEYS){const raw=lsGet(k);if(raw===null){log('  \u00b7 '+k+' VIDE','muted');continue;}const s=safeParse(raw);if(s){const info=snapInfo(s);log('  \u2713 '+k+' \u2014 '+fmtInfo(info),'ok');if(info.cycle!=null)all.push({source:'LS',key:k,snap:s,info});}else log('  \u26a0 '+k+' corrompu','warn');}
    // autres clés nexus*/aura*
    for(const k of lsKeys()){if(known.has(k))continue;if(k.startsWith('nexus')||k.startsWith('aura')){const raw=lsGet(k);const s=safeParse(raw);if(s&&typeof s.cycle==='number'){const info=snapInfo(s);log('  \u2713 (extra) '+k+' \u2014 '+fmtInfo(info),'ok');all.push({source:'LS',key:k,snap:s,info});}}}
    // sessionStorage
    log('\n\u25b6 sessionStorage','info');
    try{for(let i=0;i<sessionStorage.length;i++){const k=sessionStorage.key(i);if(k&&(k.startsWith('nexus')||k.startsWith('aura'))){const s=safeParse(ssGet(k));if(s&&typeof s.cycle==='number'){const info=snapInfo(s);log('  \u2713 '+k+' \u2014 '+fmtInfo(info),'ok');all.push({source:'SS',key:k,snap:s,info});}}}}catch(e){}
    // toutes les bases IDB
    log('\n\u25b6 IndexedDB (toutes bases)','info');
    let dbs=[];try{dbs=await listDatabases();}catch(e){}if(!dbs||!dbs.length)dbs=[{name:DB_NAME},{name:'aura_backups'}];
    for(const dbInfo of dbs){const name=dbInfo.name;if(!name)continue;const db=await openDBNamed(name);if(!db){log('  \u00b7 '+name+' (ouverture \u00e9chou\u00e9e)','muted');continue;}
      const stores=Array.from(db.objectStoreNames);
      for(const sn of stores){try{const tx=db.transaction(sn,'readonly');const store=tx.objectStore(sn);
        const entries=await new Promise((res)=>{const out=[];const r=store.openCursor();let n=0;r.onsuccess=e=>{const cur=e.target.result;if(cur&&n<20){n++;out.push({key:cur.key,value:cur.value});cur.continue();}else res(out);};r.onerror=()=>res(out);});
        for(const en of entries){const s=(typeof en.value==='string')?safeParse(en.value):en.value;if(s&&typeof s.cycle==='number'){const info=snapInfo(s);log('  \u2713 IDB:'+name+'/'+sn+'['+en.key+'] \u2014 '+fmtInfo(info),'ok');all.push({source:'IDB:'+name+'/'+sn,key:en.key,snap:s,info});}}
      }catch(e){}}
      try{db.close();}catch(e){}}
    // tri
    all.sort((a,b)=>(b.info.cycle||0)-(a.info.cycle||0));
    if(!all.length){log('\nAUCUN snapshot exploitable trouv\u00e9.','crit');document.getElementById('reCandidates').innerHTML='<div class="item crit"><span class="nm">Aucun snapshot avec un cycle.</span></div>';return;}
    _bestSnap=all[0];
    let ch='<div class="sect-label">Candidats (tri\u00e9s par cycle d\u00e9croissant)</div>';
    all.slice(0,10).forEach((r,i)=>{ch+='<div class="item '+(i===0?'ok':'')+'" style="flex-direction:column;align-items:stretch;gap:2px"><div style="display:flex;gap:8px"><span class="nm" style="font-weight:700">'+(i===0?'\u2b50 ':'')+'#'+r.info.cycle+'</span><span class="tg">'+r.source+' / '+r.key+'</span></div><div style="font-size:10px;color:var(--t2)">'+fmtInfo(r.info)+'</div></div>';});
    document.getElementById('reCandidates').innerHTML=ch;
    log('\n\u2705 MEILLEUR : cycle #'+_bestSnap.info.cycle+' dans '+_bestSnap.source+' / '+_bestSnap.key,'ok');
    _scanReport='# AURA Recovery scan '+new Date().toISOString()+'\n\n'+all.map((r,i)=>(i===0?'\u2b50 ':'   ')+r.source+' / '+r.key+'\n      '+fmtInfo(r.info)).join('\n\n')+'\n\n## Best (raw)\n\n'+JSON.stringify(_bestSnap.snap,null,2);
    document.getElementById('reRestore').disabled=false;document.getElementById('reExport').disabled=false;
    jlog('ok','RECOVERY','Meilleur cycle #'+_bestSnap.info.cycle+' ('+_bestSnap.source+')');
  }

  async function diagnose(){
    logClear();log('\u2550\u2550\u2550 DIAGNOSTIC STORAGE \u2550\u2550\u2550','event');
    log('\n\u25b6 localStorage','info');
    ['nexus_state_v2','nexus_state','nexusSnap_a','nexusSnap_latest','nexusSnap_current'].forEach(k=>{const v=lsGet(k);if(v){const p=safeParse(v);if(p)log('  \u2713 '+k+' ('+v.length.toLocaleString()+' chars) cycle='+p.cycle+' cash='+p.cashAccount+' trading='+p.tradingAccount,'ok');else log('  \u26a0 '+k+' corrompu','warn');}else log('  \u00b7 '+k+' VIDE','muted');});
    log('\n\u25b6 IndexedDB '+DB_NAME,'info');
    const db=await openDBNamed(DB_NAME,DB_VERSION);
    if(db){log('  \u2713 Base ouverte (v'+db.version+')','ok');if(db.objectStoreNames.contains(STORE)){const r=await idbGet(db,STORE,SAVE_KEY);if(r)log('  \u2713 State : cycle='+r.cycle+' cash='+r.cashAccount+' trading='+r.tradingAccount,'ok');else log('  \u00b7 '+STORE+' VIDE','muted');}else log('  \u00b7 store '+STORE+' inexistant','muted');try{db.close();}catch(e){}}
    else log('  \u26a0 IDB inaccessible','warn');
    log('\n\u25b6 sessionStorage','info');
    const ss=ssGet('nexusSnap_current');log(ss?'  \u2713 nexusSnap_current ('+ss.length+' chars)':'  \u00b7 nexusSnap_current VIDE',ss?'ok':'muted');
    const fr=ssGet('nexus_factory_reset');log(fr?'  \u26a0 FLAG factory_reset pr\u00e9sent: "'+fr+'"':'  \u00b7 factory_reset absent (bon)',fr?'crit':'muted');
    log('\n\u2550\u2550\u2550 FIN \u2550\u2550\u2550','event');
  }

  async function copyLsToIdb(){
    logClear();log('\u2550\u2550\u2550 COPIE localStorage \u2192 IndexedDB \u2550\u2550\u2550','event');
    log('Pr\u00e9serve TOUTES les donn\u00e9es existantes (chainLog, pnlHistory...)','muted');
    const raw=lsGet(SAVE_KEY);
    if(!raw){log('  \u274c localStorage.'+SAVE_KEY+' VIDE. Utilise \u00ab Scanner \u00bb + \u00ab Restaurer le meilleur \u00bb.','crit');return;}
    const parsed=safeParse(raw);if(!parsed){log('  \u274c JSON invalide','crit');return;}
    log('  \u2713 '+raw.length.toLocaleString()+' chars, cycle='+parsed.cycle,'ok');
    try{sessionStorage.removeItem('nexus_factory_reset');}catch(e){}
    const db=await openDBNamed(DB_NAME,DB_VERSION);
    if(!db){log('  \u274c IDB inaccessible','crit');return;}
    try{await new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');const s=tx.objectStore(STORE);const req=s.keyPath?s.put(parsed):s.put(parsed,SAVE_KEY);req.onsuccess=()=>res();req.onerror=()=>rej(req.error);});log('  \u2713 IDB.'+STORE+'.'+SAVE_KEY+' \u00e9crit','ok');}
    catch(e){log('  \u274c \u00e9criture: '+(e&&e.message),'crit');try{db.close();}catch(x){}return;}
    const verify=await idbGet(db,STORE,SAVE_KEY);try{db.close();}catch(e){}
    if(verify&&verify.cycle===parsed.cycle){log('  \u2713 Relecture OK : cycle='+verify.cycle,'ok');log('\n\u2705 COPIE COMPL\u00c8TE. Recharge AURA8.','ok');jlog('event','RECOVERY','LS\u2192IDB copi\u00e9 (cycle '+parsed.cycle+')');await collectState();}
    else log('  \u274c V\u00e9rification \u00e9chou\u00e9e','crit');
  }

  async function restoreBest(){
    if(!_bestSnap||!_bestSnap.snap){log('Pas de snapshot \u00e0 restaurer. Lance \u00ab Scanner \u00bb d\'abord.','crit');return;}
    if(!confirm('Restaurer cycle #'+_bestSnap.info.cycle+' dans '+SAVE_KEY+' + IndexedDB ?\n\n\u00c7a \u00e9crase l\'\u00e9tat actuel.'))return;
    log('\n\u2550\u2550\u2550 RESTAURATION \u2550\u2550\u2550','warn');
    const snap=_bestSnap.snap;if(!snap.savedAt)snap.savedAt=new Date().toISOString();if(!snap.key)snap.key=SAVE_KEY;
    try{localStorage.setItem(SAVE_KEY,JSON.stringify(snap));log('  \u2713 localStorage['+SAVE_KEY+'] \u00e9crit (cycle #'+snap.cycle+')','ok');}catch(e){log('  \u274c localStorage: '+e.message,'crit');}
    const db=await openDBNamed(DB_NAME,DB_VERSION);
    if(!db)log('  \u26a0 IDB inaccessible \u2014 restauration LS uniquement','warn');
    else{try{await new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');const s=tx.objectStore(STORE);const req=s.keyPath?s.put(snap):s.put(snap,SAVE_KEY);req.onsuccess=()=>res();req.onerror=()=>rej(req.error);tx.oncomplete=()=>res();});log('  \u2713 IDB['+DB_NAME+'.'+STORE+'] \u00e9crit','ok');}catch(e){log('  \u274c IDB: '+(e&&e.message),'crit');}try{db.close();}catch(e){}}
    log('\n\u2705 RESTAUR\u00c9. Recharge AURA8 pour v\u00e9rifier.','ok');jlog('event','RECOVERY','Restaur\u00e9 cycle #'+snap.cycle);await collectState();
  }

  const bind=(id,fn)=>{const e=document.getElementById(id);if(e)e.onclick=fn;};
  bind('reScan',scan);bind('reDiag',diagnose);bind('reCopy',copyLsToIdb);bind('reRestore',restoreBest);
  bind('reExport',()=>{if(_scanReport)downloadTxt(_scanReport,'aura_recovery_'+(_bestSnap?_bestSnap.info.cycle:'scan')+'.txt');});
};

VIEW_INIT.clean=function(){
  function analyze(){let total=0;const keys=[];for(const k of lsKeys()){const sz=getKeySize(k);total+=sz;keys.push({key:k,size:sz});}keys.sort((a,b)=>b.size-a.size);return {total,keys};}
  function render(){
    const a=analyze();const limit=10*1024*1024;
    let obsoleteTotal=0;OBSOLETE_KEYS.forEach(k=>obsoleteTotal+=getKeySize(k));
    let h=rowKV('Total localStorage',fmtBytes(a.total)+' / ~'+fmtBytes(limit),a.total>limit*0.9?'crit':'');
    h+=rowKV('Cl\u00e9s stock\u00e9es',a.keys.length);
    OBSOLETE_KEYS.forEach(k=>{const s=getKeySize(k);h+=rowKV(k,s>0?fmtBytes(s):'absent',s>100*1024?'crit':(s>0?'warn':'muted'));});
    h+=rowKV('Obsol\u00e8tes \u00e0 lib\u00e9rer',fmtBytes(obsoleteTotal),obsoleteTotal>0?'warn':'');
    h+=rowKV('\u2192 Apr\u00e8s nettoyage',fmtBytes(a.total-obsoleteTotal),'ok');
    document.getElementById('clState').innerHTML=h;
    document.getElementById('clClean').disabled=(obsoleteTotal===0);
  }
  function cleanup(){
    if(!confirm('Supprimer '+OBSOLETE_KEYS.length+' cl\u00e9s obsol\u00e8tes ?\n\nAction irr\u00e9versible.'))return;
    const log=[];let freed=0,errors=0;
    for(const k of OBSOLETE_KEYS){const sz=getKeySize(k);if(sz>0){try{localStorage.removeItem(k);if(lsGet(k)===null){log.push('\u2713 '+k+' supprim\u00e9e ('+fmtBytes(sz)+')');freed+=sz;}else{log.push('\u2717 '+k+' non supprim\u00e9e');errors++;}}catch(e){log.push('\u2717 '+k+' '+e.message);errors++;}}else log.push('- '+k+' d\u00e9j\u00e0 absente');}
    log.push('','\u2550\u2550\u2550','Espace lib\u00e9r\u00e9 : '+fmtBytes(freed),'Erreurs : '+errors);
    const lb=document.getElementById('clLog');lb.style.display='block';lb.textContent=log.join('\n');
    jlog(errors?'warn':'event','CLEAN','Nettoyage : '+fmtBytes(freed)+' lib\u00e9r\u00e9s, '+errors+' erreurs');
    render();
  }
  const bind=(id,fn)=>{const e=document.getElementById(id);if(e)e.onclick=fn;};
  bind('clRefresh',render);bind('clClean',cleanup);render();
};

VIEW_INIT.search=function(){
  document.querySelectorAll('.kwchip').forEach(c=>c.onclick=()=>{document.getElementById('sQuery').value=c.getAttribute('data-kw');});
  ['tgHTML','tgCSS','tgJS','tgCase','tgRegex'].forEach(id=>{const e=document.getElementById(id);if(e)e.onclick=()=>e.classList.toggle('on');});
  async function fetchFile(path){try{const r=await fetch(path,{cache:'no-store'});if(!r.ok)return null;return await r.text();}catch(e){return null;}}
  function searchInText(text,kw,opts){
    const lines=text.split('\n');const matches=[];let pat;
    try{if(opts.regex)pat=new RegExp(kw,opts.insensitive?'i':'');else pat=new RegExp(escapeRegex(kw),opts.insensitive?'i':'');}
    catch(e){return {error:'regex invalide: '+e.message,matches:[]};}
    for(let i=0;i<lines.length;i++){if(pat.test(lines[i]))matches.push({line:i+1,content:lines[i],before:lines.slice(Math.max(0,i-opts.ctx),i),after:lines.slice(i+1,Math.min(lines.length,i+1+opts.ctx))});}
    return {matches};
  }
  function hl(line,kw,opts){const e=escapeHtml(line);if(!kw)return e;try{let pat;if(opts.regex)pat=new RegExp('('+kw+')',opts.insensitive?'gi':'g');else pat=new RegExp('('+escapeRegex(kw)+')',opts.insensitive?'gi':'g');return e.replace(pat,'<span class="hit">$1</span>');}catch(x){return e;}}
  async function run(){
    const kw=document.getElementById('sQuery').value.trim();if(!kw){alert('Indique un mot-cl\u00e9');return;}
    const opts={ctx:Math.max(0,Math.min(20,parseInt(document.getElementById('sCtx').value)||0)),insensitive:document.getElementById('tgCase').classList.contains('on'),regex:document.getElementById('tgRegex').classList.contains('on')};
    const inc={html:document.getElementById('tgHTML').classList.contains('on'),css:document.getElementById('tgCSS').classList.contains('on'),js:document.getElementById('tgJS').classList.contains('on')};
    const files=[];if(inc.html)FILES.html.forEach(f=>files.push({path:f,kind:'html'}));if(inc.css)FILES.css.forEach(f=>files.push({path:f,kind:'css'}));if(inc.js)FILES.js.forEach(f=>files.push({path:f,kind:'js'}));
    if(!files.length){alert('Active au moins une cat\u00e9gorie');return;}
    _searchKeyword=kw;
    const prog=document.getElementById('sProgress'),progTxt=document.getElementById('sProgressTxt'),bar=document.getElementById('sBar');
    const sum=document.getElementById('sSummary'),res=document.getElementById('sResults'),dl=document.getElementById('sDl');
    prog.style.display='block';sum.innerHTML='';res.style.display='none';res.innerHTML='';dl.style.display='none';
    let total=0,withMatch=0,scanned=0,notFound=0;const fileResults=[];const t0=Date.now();
    const BATCH=5;
    for(let b=0;b<files.length;b+=BATCH){
      const batch=files.slice(b,b+BATCH);
      const br=await Promise.all(batch.map(async f=>{const text=await fetchFile(f.path);if(text===null)return Object.assign({},f,{notFound:true});return Object.assign({},f,searchInText(text,kw,opts));}));
      for(const fr of br){scanned++;if(fr.notFound)notFound++;else if(fr.matches&&fr.matches.length){total+=fr.matches.length;withMatch++;fileResults.push(fr);}}
      const pct=Math.round(scanned/files.length*100);bar.style.width=pct+'%';progTxt.textContent='Scan '+scanned+'/'+files.length+' \u00b7 '+total+' matchs \u00b7 '+withMatch+' fichiers';
    }
    const elapsed=((Date.now()-t0)/1000).toFixed(1);prog.style.display='none';
    sum.innerHTML='<div class="item ok"><span class="nm"><b>'+total+'</b> matchs dans <b>'+withMatch+'</b> fichier(s) \u00b7 scann\u00e9 '+scanned+(notFound?(' \u00b7 '+notFound+' inaccessibles'):'')+' \u00b7 '+elapsed+'s</span></div>';
    if(!fileResults.length){res.style.display='block';res.innerHTML='<div class="hint">Aucun match. Essaie insensible casse ou autre mot-cl\u00e9.</div>';jlog('warn','SEARCH',kw+' : 0 match');return;}
    const order={html:1,css:2,js:3};fileResults.sort((a,b)=>order[a.kind]!==order[b.kind]?order[a.kind]-order[b.kind]:a.path.localeCompare(b.path));
    let html='';let txt='\u2550\u2550\u2550 AURA MULTI-SEARCH \u2550\u2550\u2550\nKeyword: '+kw+'\nOptions: '+(opts.regex?'regex \u00b7 ':'')+(opts.insensitive?'insensible':'sensible')+' \u00b7 context='+opts.ctx+'\nTotal: '+total+' dans '+withMatch+' fichier(s) \u00b7 '+elapsed+'s\nDate: '+new Date().toISOString()+'\n\n';
    for(const fr of fileResults){const fn=fr.path.replace(/^\.\//,'');
      html+='<div class="log-entry"><span class="log-event">'+(fr.kind==='html'?'\ud83d\udcc4':fr.kind==='css'?'\ud83c\udfa8':'\u2699\ufe0f')+' '+fn+'</span> <span class="log-time">'+fr.matches.length+' match(s)</span></div>';
      txt+='\n\u2501\u2501\u2501 '+fn+' ('+fr.matches.length+') \u2501\u2501\u2501\n';
      for(const m of fr.matches){
        for(const c of m.before){html+='<div class="log-muted" style="padding-left:10px">  '+escapeHtml(c.slice(0,160))+'</div>';txt+='       \u00b7 '+c+'\n';}
        html+='<div style="padding-left:10px;color:var(--t1)">'+m.line+': '+hl(m.content.slice(0,200),kw,opts)+'</div>';txt+=String(m.line).padStart(6)+' > '+m.content+'\n';
        for(const c of m.after){html+='<div class="log-muted" style="padding-left:10px">  '+escapeHtml(c.slice(0,160))+'</div>';txt+='       \u00b7 '+c+'\n';}
        html+='<div style="height:4px"></div>';
      }
    }
    res.style.display='block';res.innerHTML=html;_searchResultText=txt;dl.style.display='block';
    jlog('ok','SEARCH',kw+' : '+total+' match(s) dans '+withMatch+' fichier(s)');
  }
  const b=document.getElementById('sRun');if(b)b.onclick=run;
  const d=document.getElementById('sDl');if(d)d.onclick=()=>{if(_searchResultText){const safe=_searchKeyword.replace(/[^a-zA-Z0-9_-]/g,'_').slice(0,40);downloadTxt(_searchResultText,'aura-search-'+safe+'.txt');}};
};

/* ============================================================
   SERVICE WORKER (unregister + clear caches, storage préservé)
   ============================================================ */
VIEWS.sw=function(){
  let h='<div class="panels"><div class="panel full"><div class="panel-head"><span class="panel-title">&#9881; Service Worker &amp; caches</span></div><div class="panel-body">';
  h+='<div class="hint">D\u00e9sinscrit le service worker et vide les caches (utile quand l\'app charge du vieux code). <b>Ne touche pas</b> \u00e0 localStorage ni IndexedDB.</div>';
  h+='<div id="swStatus"></div>';
  h+='<div class="controls"><button class="btn" id="swList">&#128269; \u00c9tat SW</button><button class="btn danger" id="swClear">\ud83d\uddd1 Unregister + vider caches</button></div>';
  h+='<div class="outbox" id="swLog" style="display:none"></div>';
  h+='</div></div></div>';return h;
};
VIEW_INIT.sw=function(){
  const status=document.getElementById('swStatus');
  async function showState(){
    let h='';
    if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();h+=rowKV('Service workers',regs.length);regs.forEach(r=>h+='<div class="item"><span class="nm">'+(r.scope||'?')+'</span></div>');}
    else h+=rowKV('Service Worker','non support\u00e9','warn');
    if('caches' in window){const keys=await caches.keys();h+=rowKV('Caches',keys.length);keys.forEach(k=>h+='<div class="item"><span class="nm">'+escapeHtml(k)+'</span></div>');}
    status.innerHTML=h;
  }
  async function clearAll(){
    if(!confirm('D\u00e9sinscrire le SW et vider tous les caches ?\n\nlocalStorage et IndexedDB ne seront PAS touch\u00e9s.'))return;
    const log=document.getElementById('swLog');log.style.display='block';log.innerHTML='';
    const add=(m,c)=>{log.innerHTML+=(c?'<span class="log-'+c+'">'+escapeHtml(m)+'</span>':escapeHtml(m))+'\n';};
    add('\u2550\u2550\u2550 NETTOYAGE \u2550\u2550\u2550','event');
    add('\u25bc [1/2] Service Workers','info');
    if('serviceWorker' in navigator){try{const regs=await navigator.serviceWorker.getRegistrations();if(!regs.length)add('  \u00b7 aucun SW','muted');for(const r of regs){const ok=await r.unregister();add('  '+(ok?'\u2713':'\u2717')+' '+(r.scope||'?'),ok?'ok':'crit');}}catch(e){add('  \u2717 '+e.message,'crit');}}else add('  \u2717 non support\u00e9','crit');
    add('\u25bc [2/2] Caches','info');
    if('caches' in window){try{const keys=await caches.keys();if(!keys.length)add('  \u00b7 aucun cache','muted');for(const k of keys){const ok=await caches.delete(k);add('  '+(ok?'\u2713':'\u26a0')+' '+k,ok?'ok':'warn');}}catch(e){add('  \u2717 '+e.message,'crit');}}else add('  \u2717 non support\u00e9','crit');
    try{add('  \u2713 localStorage : '+Object.keys(localStorage).length+' cl\u00e9s pr\u00e9serv\u00e9es','ok');}catch(e){}
    add('\u2550\u2550\u2550 TERMIN\u00c9. Recharge AURA8. \u2550\u2550\u2550','ok');
    jlog('event','SW','SW d\u00e9sinscrit + caches vid\u00e9s');showState();
  }
  const bind=(id,fn)=>{const e=document.getElementById(id);if(e)e.onclick=fn;};
  bind('swList',showState);bind('swClear',clearAll);showState();
};

function refreshHeader(){
  const S=CTX.S;
  document.getElementById('hs-mode').textContent=S&&S.tradingMode?S.tradingMode:'\u2014';
  let alerts=0;
  if(CTX.lsCycle!=null&&CTX.idbCycle!=null&&Math.abs(CTX.lsCycle-CTX.idbCycle)>20)alerts++;
  if(_bugResults)alerts+=_bugResults.filter(b=>b.det.hit&&b.statut!=='r\u00e9solu'&&b.statut!=='cosm\u00e9tique').length;
  const he=document.getElementById('hs-health');
  he.textContent=alerts>0?(alerts+' alerte(s)'):'OK';he.style.color=alerts>0?'var(--gold)':'var(--up)';
  const bar=document.getElementById('alertBar');
  if(alerts>0){bar.classList.add('show');document.getElementById('alertCount').textContent=alerts;}else bar.classList.remove('show');
}
/* ============================================================
   PAGES INTELLIGENTES (moteur de sondes GuardianCore)
   ============================================================ */
let _coreLast=null;
const GC = ()=> window.GuardianCore;

VIEWS.analyse=function(){
  let h='<div class="hint">Lance les sondes intelligentes : incohérences UI↔état, valeurs, stockage, erreurs JS, fichiers, fonctions, variables non définies… Chaque problème indique le chemin de correction.</div>';
  if(!GC()){ h+='<div class="item crit"><span class="nm">guardian-core.js non chargé. Place les 3 fichiers dans le même dossier.</span></div>'; return h; }
  h+='<button class="btn green wide" id="anaRun" style="width:100%">▶ Lancer l\'analyse complète</button><div id="anaOut" style="margin-top:10px"></div>';
  return h;
};
VIEW_INIT.analyse=function(){
  if(_coreLast) renderAnalyse(_coreLast);
  const b=document.getElementById('anaRun');
  if(b) b.onclick=async()=>{
    b.innerHTML='<span class="spinner"></span> analyse…';b.disabled=true;
    try{ _coreLast=await GC().runAll(); renderAnalyse(_coreLast); updateCoreBadges(_coreLast); }
    catch(e){ document.getElementById('anaOut').innerHTML='<div class="item crit"><span class="nm">Erreur: '+(e&&e.message)+'</span></div>'; }
    b.innerHTML='▶ Relancer';b.disabled=false;
  };
};
function renderAnalyse(rep){
  const out=document.getElementById('anaOut'); if(!out) return;
  const crit=rep.results.filter(r=>r.level==='crit').length, warn=rep.results.filter(r=>r.level==='warn').length, ok=rep.results.filter(r=>r.level==='ok').length;
  let h='<div class="summary-bar"><span class="chip crit">'+crit+' critique(s)</span><span class="chip warn">'+warn+' avert.</span><span class="chip ok">'+ok+' OK</span></div>';
  if(rep.mode!=='embedded') h+='<div class="hint">⚠ Page séparée : UI↔état et erreurs JS live ne sont actives qu\'intégré dans AURA.</div>';
  const groups={}; rep.results.forEach(r=>{(groups[r.group]=groups[r.group]||[]).push(r);});
  Object.keys(groups).forEach(g=>{
    h+='<div class="sect-label">'+g+'</div>';
    groups[g].sort((a,b)=>({crit:0,warn:1,info:2,ok:3}[a.level]-{crit:0,warn:1,info:2,ok:3}[b.level]));
    groups[g].forEach(r=>{
      const ic=r.level==='ok'?'✅':r.level==='warn'?'🟡':r.level==='crit'?'🔴':'ℹ️';
      h+='<div class="item '+r.level+'" style="flex-direction:column;align-items:stretch;gap:3px">';
      h+='<div style="display:flex;gap:6px"><span class="ic">'+ic+'</span><span class="nm" style="font-weight:700">'+escAna(r.title)+'</span></div>';
      if(r.detail) h+='<div style="font-size:10px;color:var(--t2);line-height:1.5">'+escAna(r.detail)+'</div>';
      if(r.fix) h+='<div style="font-size:10px;color:var(--ice);line-height:1.5;padding:5px 7px;background:rgba(56,212,245,.06);border-radius:5px"><b style="color:var(--gold)">→ Correction :</b> '+escAna(r.fix)+'</div>';
      h+='</div>';
    });
  });
  out.innerHTML=h;
}
function escAna(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function updateCoreBadges(rep){
  const crit=rep.results.filter(r=>r.level==='crit').length;
  const warn=rep.results.filter(r=>r.level==='warn').length;
  setTabBadge('analyse', crit>0?'crit':'warn', crit||warn||0);
}
PAGE_ACTIONS.analyse={
  json:()=>({content:GC().export.resultsJSON(),name:'guardian-analyse.json'}),
  text:()=>({content:GC().export.resultsText(),name:'guardian-analyse.txt'}),
  backup:()=>({content:GC().export.fullBackup(),name:'guardian-backup.json'})
};

VIEWS.export=function(){
  if(!GC()) return '<div class="hint">core non chargé.</div>';
  let h='<div class="hint">Tout Guardian est exportable (JSON + texte) et réimportable. Le backup global contient config + historique + résultats + capacités.</div>';
  h+='<div class="sect-label">Backup global</div><div class="controls"><button class="btn green" id="exBk">⬇ Backup JSON</button><button class="btn green" id="imBk">⬆ Importer backup</button></div>';
  h+='<div class="sect-label">Configuration</div><div class="controls"><button class="btn gold" id="exCfg">⬇ Config JSON</button><button class="btn gold" id="imCfg">⬆ Importer config</button></div>';
  h+='<div class="sect-label">Résultats du dernier scan</div><div class="controls"><button class="btn" id="exRj">JSON</button><button class="btn" id="exRt">Texte</button></div>';
  h+='<input type="file" id="impFile" accept="application/json" style="display:none">';
  h+='<div id="impMsg" class="hint" style="margin-top:10px"></div>';
  return h;
};
VIEW_INIT.export=function(){
  const C=GC(); if(!C) return;
  const stamp=()=>new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
  const bind=(id,fn)=>{const e=document.getElementById(id);if(e)e.onclick=fn;};
  bind('exBk',()=>dlFile(C.export.fullBackup(),'guardian-backup-'+stamp()+'.json','application/json'));
  bind('exCfg',()=>dlFile(C.export.configJSON(),'guardian-config-'+stamp()+'.json','application/json'));
  bind('exRj',()=>dlFile(C.export.resultsJSON(),'guardian-results-'+stamp()+'.json','application/json'));
  bind('exRt',()=>dlFile(C.export.resultsText(),'guardian-results-'+stamp()+'.txt'));
  const f=document.getElementById('impFile'); let kind=null;
  const trig=k=>{kind=k;f.value='';f.click();};
  bind('imBk',()=>trig('backup')); bind('imCfg',()=>trig('config'));
  f.onchange=()=>{ const file=f.files[0]; if(!file)return; const rd=new FileReader();
    rd.onload=()=>{ let o=null; try{o=JSON.parse(rd.result);}catch(e){document.getElementById('impMsg').innerHTML='<span style="color:var(--down)">JSON invalide.</span>';return;}
      const res=C.import.fromObject(o); document.getElementById('impMsg').innerHTML='<span style="color:'+(res.ok?'var(--up)':'var(--down)')+'">'+res.msg+'</span>'; };
    rd.readAsText(file); };
};

VIEWS.autobackup=function(){
  if(!GC()||!GC().autoBackup) return '<div class="hint">Module backup auto indisponible (core non chargé).</div>';
  let h='<div class="hint">Sauvegardes automatiques de l\'état AURA dans une base IDB dédiée. Tournent en arrière-plan quand AURA est ouverte. Rotation : les plus vieux sont supprimés au-delà du nombre gardé.</div>';
  h+='<div class="sect-label">Réglages</div><div id="abCfg"></div>';
  h+='<div class="controls" style="margin-top:8px"><button class="btn green" id="abNow">💾 Backup maintenant</button></div>';
  h+='<div class="sect-label">☁ Google Drive</div><div class="hint">Envoi automatique des backups sur ton Drive (hors navigateur : survit à une réinstallation). Une autorisation unique au départ.</div><div id="drvBox"></div>';
  h+='<div class="sect-label">Backups enregistrés (local)</div><div id="abList"><div class="hint">Chargement…</div></div>';
  return h;
};
VIEW_INIT.autobackup=function(){
  const A=GC().autoBackup;
  // réglages
  const meta=A.getMeta();
  const cfg=document.getElementById('abCfg');
  cfg.innerHTML='<div class="item"><span class="nm">Fréquence : <b>'+(meta.intervalMin?meta.intervalMin+' min':meta.intervalH+'h')+'</b> · Garder : <b>'+meta.keep+'</b> backups · '+(meta.enabled?'<span style="color:var(--up)">activé</span>':'<span style="color:var(--down)">désactivé</span>')+'</span></div>'
    +'<div class="controls c3" style="margin-top:6px">'
    +'<button class="btn" data-min="5">5 min (test)</button><button class="btn" data-h="3">3h</button><button class="btn" data-h="6">6h</button><button class="btn" data-h="12">12h</button></div>';
  cfg.querySelectorAll('[data-h]').forEach(b=>{ b.onclick=()=>{ const m=A.getMeta(); m.intervalH=parseInt(b.getAttribute('data-h')); delete m.intervalMin; A.setMeta(m); switchTab('autobackup'); }; });
  cfg.querySelectorAll('[data-min]').forEach(b=>{ b.onclick=()=>{ const m=A.getMeta(); m.intervalMin=parseInt(b.getAttribute('data-min')); A.setMeta(m); switchTab('autobackup'); }; });
  // backup manuel
  document.getElementById('abNow').onclick=async()=>{
    const btn=document.getElementById('abNow'); btn.textContent='⏳…'; btn.disabled=true;
    const r=await A.run(true);
    btn.textContent= r.ok ? '✓ Backup #'+r.cycle : '✗ '+(r.reason||'échec'); 
    setTimeout(()=>switchTab('autobackup'),1200);
  };
  // section Drive
  const D = GC().drive;
  const drvBox = document.getElementById('drvBox');
  if(D && drvBox){
    const dm = D.getMeta();
    if(dm.enabled){
      const last = dm.lastUpload ? new Date(dm.lastUpload).toLocaleString('fr-FR') : 'jamais';
      drvBox.innerHTML = '<div class="item"><span class="nm">✅ Drive connecté · dernier envoi : '+last+'</span></div>'
        +'<div class="controls" style="margin-top:6px"><button class="btn green" id="drvTest">☁ Envoyer sur Drive maintenant</button><button class="btn" id="drvOff">Déconnecter</button></div>';
    } else {
      drvBox.innerHTML = '<div class="controls"><button class="btn green" id="drvOn">🔗 Connecter Google Drive</button></div>';
    }
    const onBtn = document.getElementById('drvOn');
    if(onBtn) onBtn.onclick = async()=>{ onBtn.textContent='⏳ autorisation…'; const r=await D.connect(); onBtn.textContent = r.ok ? '✓ connecté' : '✗ '+(r.reason||'échec'); setTimeout(()=>switchTab('autobackup'),1500); };
    const testBtn = document.getElementById('drvTest');
    if(testBtn) testBtn.onclick = async()=>{ testBtn.textContent='⏳ envoi…'; const r=await D.uploadNow().catch(()=>({ok:false,reason:'erreur'})); testBtn.textContent = r.ok ? '✓ '+r.name : '✗ '+(r.reason||'échec'); setTimeout(()=>switchTab('autobackup'),2000); };
    const offBtn = document.getElementById('drvOff');
    if(offBtn) offBtn.onclick = ()=>{ D.disconnect(); switchTab('autobackup'); };
  }
  // liste
  A.list().then(list=>{
    const el=document.getElementById('abList'); if(!el) return;
    if(!list.length){ el.innerHTML='<div class="hint">Aucun backup auto pour l\'instant. Le premier se fera bientôt (ou clique « Backup maintenant »).</div>'; return; }
    let h='<div class="hint">'+list.length+' backup(s) · du plus récent au plus ancien</div>';
    list.forEach(b=>{
      h+='<div class="item"><span class="nm">#'+b.cycle+' · '+new Date(b.ts).toLocaleString('fr-FR')+' · '+(typeof b.portfolio==='number'?Math.round(b.portfolio):'?')+'</span>'
        +'<button class="btn" data-id="'+b.id+'" style="flex:0 0 auto;padding:6px 10px">⬇ JSON</button></div>';
    });
    el.innerHTML=h;
    el.querySelectorAll('[data-id]').forEach(btn=>{
      btn.onclick=async()=>{ const rec=await A.get(parseInt(btn.getAttribute('data-id'))); if(rec&&rec.snapshot){ const obj=Object.assign({},rec.snapshot); if(!obj.key)obj.key='nexus_state_v2'; dlFile(obj,'aura-autobackup-'+rec.cycle+'.json','application/json'); } };
    });
  });
};

(function init(){
  jlog && jlog('info','INIT','Guardian tout-en-un démarré');
  // synchroniser la liste de fichiers avec le HTML réel d'AURA (source de vérité)
  syncFilesFromHTML().then(()=>{ collectState && collectState().then(()=>{ runBugScan&&runBugScan(); refreshHeader&&refreshHeader(); }); });
  goHome();
  // tick backup auto (utile pour tester depuis cette page) : warmup Drive puis vérif toutes les 2 min
  try {
    const C = window.GuardianCore;
    if(C && C.autoBackup){
      const tick = () => { C.autoBackup.tick().then(r=>{ if(r&&r.ok && C.drive){ C.drive.autoPush().catch(()=>{}); } }).catch(()=>{}); };
      if(C.drive){ const m=C.drive.getMeta(); if(m&&m.enabled && C.drive.warmup) setTimeout(()=>C.drive.warmup().catch(()=>{}),3000); }
      setTimeout(tick, 6000);
      setInterval(tick, 2*60*1000);
    }
  } catch(e){}
})();
