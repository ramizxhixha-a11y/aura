<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA8 · Outil de Restauration v2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050709;
    color: #e6ebf5;
    font-family: -apple-system, system-ui, sans-serif;
    padding: 20px;
    min-height: 100vh;
  }
  h1 {
    font-size: 18px;
    color: #38d4f5;
    letter-spacing: .08em;
    margin-bottom: 6px;
  }
  .sub {
    font-size: 12px;
    color: #9aa0a6;
    margin-bottom: 24px;
  }
  .btn {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border-radius: 12px;
    border: 1.5px solid;
    background: transparent;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .05em;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-diag {
    border-color: rgba(56,212,245,.5);
    color: #38d4f5;
    background: rgba(56,212,245,.08);
  }
  .btn-copy {
    border-color: rgba(0,232,122,.7);
    color: #00e87a;
    background: rgba(0,232,122,.12);
    font-size: 15px;
  }
  .btn-restore {
    border-color: rgba(245,200,66,.5);
    color: #f5c842;
    background: rgba(245,200,66,.06);
  }
  .btn-go {
    border-color: rgba(168,85,247,.6);
    color: #a855f7;
    background: rgba(168,85,247,.1);
  }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .4; pointer-events: none; }
  .badge-reco {
    display: inline-block;
    background: rgba(0,232,122,.2);
    color: #00e87a;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .1em;
    margin-left: 8px;
    vertical-align: middle;
  }
  .log {
    background: rgba(255,255,255,.02);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 10px;
    padding: 14px;
    margin-top: 16px;
    font-family: 'SF Mono', monospace;
    font-size: 11px;
    line-height: 1.6;
    max-height: 50vh;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .ok    { color: #00e87a; }
  .warn  { color: #f5c842; }
  .err   { color: #ff3d6b; }
  .info  { color: #38d4f5; }
  .muted { color: #5a6068; }
</style>
</head>
<body>

<h1>🔧 AURA8 · OUTIL DE RESTAURATION v2</h1>
<div class="sub">Diagnostic et restauration du state</div>

<button class="btn btn-diag" id="diagBtn">📊 Diagnostiquer le storage actuel</button>

<button class="btn btn-copy" id="copyBtn">📋 Copier localStorage → IndexedDB <span class="badge-reco">RECOMMANDÉ</span></button>

<button class="btn btn-restore" id="restoreBtn">🔄 Forcer restauration depuis backup 06/05 (simplifié, écrase)</button>

<button class="btn btn-go" id="goBtn">▶ Ouvrir AURA8</button>

<div class="log" id="log"></div>

<script>
const SAVE_KEY = 'nexus_state_v2';
const DB_NAME  = 'NEXUS_DB';
const DB_VERSION = 3;
const STORE_STATE = 'state';

// Backup simplifié (fallback si localStorage est aussi vide)
const BACKUP_STATE_SIMPLE = {
  cycle: 12383, cycleTimer: 26, cycleMax: 30,
  portfolio: 1514.4325154867681,
  pnl24h: 29.643010662919306,
  cashAccount: 0.8516242735984881,
  tradingAccount: 1513.5808912131697,
  leverage: 0,
  portfolioTotal: 1293.8372464159345,
  usdEurRate: 0.854338,
  fiscalReserveAccount: 0,
  fiscalReserveLog: [],
  ownFundsInjected: 1168.1559289180627,
  leverageReserve: 151358.08912131697,
  leverageMaxMult: 10,
  totalTrades: 9, winTrades: 4,
  botAutoMode: true,
  version: 2
};

const logEl = document.getElementById('log');
function log(msg, cls) {
  const span = document.createElement('div');
  if (cls) span.className = cls;
  span.textContent = msg;
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog() { logEl.innerHTML = ''; }

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_STATE)) db.createObjectStore(STORE_STATE);
      if (!db.objectStoreNames.contains('fees'))      db.createObjectStore('fees');
      if (!db.objectStoreNames.contains('trades'))    db.createObjectStore('trades');
    };
  });
}

// ═══ Diagnostic ═══
async function diagnose() {
  clearLog();
  log('═══ DIAGNOSTIC DU STORAGE ═══', 'info');
  log('');
  log('▶ [1/3] localStorage', 'info');
  const lsKeys = ['nexus_state_v2', 'nexus_state', 'nexusSnap_a', 'nexusSnap_b', 'nexusSnap_latest'];
  lsKeys.forEach(k => {
    const v = localStorage.getItem(k);
    if (v) {
      try {
        const p = JSON.parse(v);
        log('  ✓ ' + k + ' (' + v.length.toLocaleString() + ' chars)', 'ok');
        log('     cycle=' + p.cycle + ' cash=' + p.cashAccount + ' trading=' + p.tradingAccount + ' portfolio=' + p.portfolio, 'muted');
      } catch(e) { log('  ⚠ ' + k + ' corrompu', 'warn'); }
    } else log('  · ' + k + ' VIDE', 'muted');
  });
  log('');
  log('▶ [2/3] IndexedDB ' + DB_NAME, 'info');
  try {
    const db = await openDB();
    log('  ✓ Base ouverte (v' + db.version + ')', 'ok');
    if (db.objectStoreNames.contains(STORE_STATE)) {
      const tx = db.transaction(STORE_STATE, 'readonly');
      const req = tx.objectStore(STORE_STATE).get(SAVE_KEY);
      const r = await new Promise((res, rej) => { req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error); });
      if (r) log('  ✓ State trouvé : cycle=' + r.cycle + ' cash=' + r.cashAccount + ' trading=' + r.tradingAccount, 'ok');
      else log('  · IndexedDB.' + STORE_STATE + ' VIDE', 'muted');
    } else log('  · Store "' + STORE_STATE + '" inexistant', 'muted');
    db.close();
  } catch(e) { log('  ⚠ IndexedDB erreur: ' + e.message, 'warn'); }
  log('');
  log('▶ [3/3] sessionStorage', 'info');
  const ss = sessionStorage.getItem('nexusSnap_current');
  if (ss) log('  ✓ nexusSnap_current (' + ss.length + ' chars)', 'ok');
  else log('  · nexusSnap_current VIDE', 'muted');
  const fr = sessionStorage.getItem('nexus_factory_reset');
  if (fr) log('  ⚠ FLAG factory_reset présent: "' + fr + '"', 'err');
  else log('  · factory_reset absent (bon)', 'muted');
  log('');
  log('═══ FIN DIAGNOSTIC ═══', 'info');
}

// ═══ Copier localStorage → IndexedDB (NOUVEAU, RECOMMANDÉ) ═══
async function copyLsToIdb() {
  clearLog();
  log('═══ COPIE localStorage → IndexedDB ═══', 'info');
  log('Préserve TOUTES tes données existantes (chainLog, pnlHistory, etc.)', 'muted');
  log('');
  document.getElementById('copyBtn').disabled = true;
  document.getElementById('diagBtn').disabled = true;
  document.getElementById('restoreBtn').disabled = true;
  try {
    log('▶ [1/4] Lecture de localStorage.' + SAVE_KEY, 'info');
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) {
      log('  ❌ localStorage.' + SAVE_KEY + ' est VIDE !', 'err');
      log('  Utilise le bouton "Forcer restauration backup 06/05" à la place.', 'warn');
      throw new Error('localStorage vide');
    }
    log('  ✓ ' + raw.length.toLocaleString() + ' chars lus', 'ok');
    const parsed = JSON.parse(raw);
    log('  ✓ JSON valide : cycle=' + parsed.cycle + ' cash=$' + (parsed.cashAccount||0).toFixed(2) + ' trading=$' + (parsed.tradingAccount||0).toFixed(2), 'ok');
    log('');
    log('▶ [2/4] Nettoyage flag factory_reset', 'info');
    sessionStorage.removeItem('nexus_factory_reset');
    log('  ✓ Flag supprimé', 'ok');
    log('');
    log('▶ [3/4] Écriture IndexedDB', 'info');
    const db = await openDB();
    await new Promise((res, rej) => {
      const tx = db.transaction(STORE_STATE, 'readwrite');
      const req = tx.objectStore(STORE_STATE).put(parsed, SAVE_KEY);
      req.onsuccess = () => res();
      req.onerror = () => rej(req.error);
    });
    log('  ✓ IndexedDB.' + STORE_STATE + '.' + SAVE_KEY + ' écrit', 'ok');
    db.close();
    log('');
    log('▶ [4/4] Vérification', 'info');
    const db2 = await openDB();
    const tx = db2.transaction(STORE_STATE, 'readonly');
    const req = tx.objectStore(STORE_STATE).get(SAVE_KEY);
    const verify = await new Promise((res, rej) => { req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error); });
    db2.close();
    if (verify && verify.cycle === parsed.cycle) {
      log('  ✓ Relecture OK : cycle=' + verify.cycle + ' cash=$' + (verify.cashAccount||0).toFixed(2), 'ok');
    } else {
      throw new Error('Vérification a échoué');
    }
    log('');
    log('✅ COPIE COMPLÈTE — IndexedDB synchronisé avec localStorage', 'ok');
    log('');
    log('Maintenant tape sur "▶ Ouvrir AURA8" pour aller voir.', 'info');
    document.getElementById('copyBtn').textContent = '✅ Copie terminée';
  } catch(e) {
    log('', 'err');
    log('❌ ERREUR: ' + e.message, 'err');
    document.getElementById('copyBtn').disabled = false;
    document.getElementById('diagBtn').disabled = false;
    document.getElementById('restoreBtn').disabled = false;
  }
}

// ═══ Force restore from simple backup (fallback) ═══
async function forceRestore() {
  if (!confirm('Cette option va ÉCRASER ton state actuel avec un backup simplifié (sans chainLog, pnlHistory, etc.). Tu perdras les données détaillées. Continuer ?')) return;
  clearLog();
  log('═══ RESTAURATION FORCÉE DEPUIS BACKUP SIMPLIFIÉ ═══', 'warn');
  log('');
  document.getElementById('restoreBtn').disabled = true;
  document.getElementById('copyBtn').disabled = true;
  document.getElementById('diagBtn').disabled = true;
  try {
    sessionStorage.removeItem('nexus_factory_reset');
    log('✓ Flag factory_reset supprimé', 'ok');
    const db = await openDB();
    await new Promise((res, rej) => {
      const tx = db.transaction(STORE_STATE, 'readwrite');
      const req = tx.objectStore(STORE_STATE).put(BACKUP_STATE_SIMPLE, SAVE_KEY);
      req.onsuccess = () => res();
      req.onerror = () => rej(req.error);
    });
    log('✓ IndexedDB écrit', 'ok');
    db.close();
    const json = JSON.stringify(BACKUP_STATE_SIMPLE);
    localStorage.setItem('nexus_state_v2', json);
    localStorage.setItem('nexus_state', json);
    localStorage.setItem('nexusSnap_a', json);
    localStorage.setItem('nexusSnap_latest', 'nexusSnap_a');
    sessionStorage.setItem('nexusSnap_current', json);
    log('✓ Toutes les clés écrites', 'ok');
    log('');
    log('✅ RESTAURATION FORCÉE TERMINÉE', 'ok');
    document.getElementById('restoreBtn').textContent = '✅ Restauration terminée';
  } catch(e) {
    log('❌ ERREUR: ' + e.message, 'err');
    document.getElementById('restoreBtn').disabled = false;
    document.getElementById('copyBtn').disabled = false;
    document.getElementById('diagBtn').disabled = false;
  }
}

document.getElementById('diagBtn').addEventListener('click', diagnose);
document.getElementById('copyBtn').addEventListener('click', copyLsToIdb);
document.getElementById('restoreBtn').addEventListener('click', forceRestore);
document.getElementById('goBtn').addEventListener('click', () => {
  window.location.href = './AURA8_v118.html';
});

log('Outil v2 prêt.', 'info');
log('1. "Diagnostiquer" pour voir ton storage', 'muted');
log('2. "Copier localStorage → IndexedDB" pour synchroniser sans rien perdre', 'muted');
log('3. "Ouvrir AURA8" pour voir le résultat', 'muted');
</script>

</body>
</html>
